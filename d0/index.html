<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ディメンション・ゼロ シミュレーター (I-1 構築済みデッキ)</title>
<style>
:root{--bg:#0d1117;--panel:#161d27;--panel2:#1f2937;--ink:#dce6f2;--dim:#8899ab;--line:#2e3d50;--gold:#e0b34c;
--赤:#c74a3a;--黒:#8459a8;--青:#3e8ed0;--白:#c9c9b8;--緑:#4caf6d;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:13px}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#main3{display:flex;flex:1;overflow:hidden}
#paneL{width:340px;min-width:320px;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px;border-right:1px solid var(--line)}
#turnStrip{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;justify-content:center}
#logBtn{display:none}   /* PCは右ドロワーを使うのでボタンは非表示。スマホでのみ表示 */
#paneC{flex:1;display:flex;flex-direction:column;gap:6px;padding:8px;overflow-y:auto;min-width:340px;align-items:center}
#paneC .pbar,#paneC #prompt,#paneC #handRow,#paneC #board{width:100%;max-width:600px}
#paneC h3,#paneR h3{padding:4px 8px;font-size:12px;color:var(--gold)}
#stackWrap{background:var(--panel);border:1px solid var(--line);border-radius:8px}
#stackWrap h3{padding:4px 8px;margin:0;font-size:12px;color:var(--gold)}
/* 右=対戦記録の引き出し。openで展開、外すと細いタブだけ */
#logBackdrop{display:none;position:fixed;inset:0;background:#000a;z-index:74;cursor:pointer}   /* スマホのみ .on で表示(左の空きスペース=背景タップで閉じる) */
#paneR{width:300px;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;transition:width .18s}
#paneR:not(.open){width:34px}
#paneR #logToggle{writing-mode:horizontal-tb;font-size:11px;padding:6px 4px;border-radius:0;border:none;border-bottom:1px solid var(--line);background:var(--panel2)}
#paneR:not(.open) #logToggle{writing-mode:vertical-rl;height:100%;border-bottom:none}
#paneR:not(.open) #logInner{display:none}
#logInner{flex:1;display:flex;flex-direction:column;overflow:hidden}
#side{display:none}
button{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12.5px}
button:hover{border-color:var(--gold);color:var(--gold)}
button:disabled{opacity:.35;cursor:default}
button.primary{background:#443714;border-color:var(--gold);color:var(--gold);font-weight:bold}
/* ヘッダ */
#hdr{display:flex;gap:12px;align-items:center;padding:4px 8px;background:var(--panel);border:1px solid var(--line);border-radius:8px;font-size:12px}
#hdr b{color:var(--gold)}
#hdr .hdrTitle{white-space:nowrap;font-weight:bold}
/* アカウント(ログイン/ニックネーム) */
.acct{display:inline-flex;align-items:center;position:relative}
.acctLogin{font-size:11px;padding:4px 9px;white-space:nowrap}
.acctName{cursor:pointer;font-size:12px;padding:3px 9px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.acctMenu{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 4px 16px #000a;z-index:90;min-width:150px;flex-direction:column;padding:4px}
.acctMenu.on{display:flex}
.acctMenu button{width:100%;text-align:left;border:none;background:transparent;padding:8px 10px;border-radius:5px;font-size:12px}
.acctMenu button:hover{background:var(--panel2)}
#hdrMenuBtn{display:none}                 /* PCでは非表示、コントロールはインライン */
#hdrControls{display:contents}            /* PCでは透過してヘッダのflexに直接並ぶ */
/* プレイヤー情報バー */
.pbar{display:flex;gap:10px;align-items:center;padding:4px 8px;background:var(--panel);border:1px solid var(--line);border-radius:8px;font-size:12px;flex-wrap:wrap}
.pbar .nm{font-weight:bold;min-width:110px}
.pbar .zn{cursor:pointer;padding:2px 6px;background:var(--panel2);border-radius:5px}
.pbar .zn:hover{outline:1px solid var(--gold)}
.pbar .zn.actionable{outline:1.5px solid var(--gold);box-shadow:0 0 6px #e0b34c55}
.paychip{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;margin:3px;border-radius:6px;border:2px solid #0008;cursor:pointer;font-size:11.5px;color:#fff}
.paychip.sel{outline:3px solid var(--gold)}
.paychip.dis{opacity:.35;cursor:default}
.energy{display:inline-flex;gap:3px;align-items:center;flex-wrap:wrap;vertical-align:middle}
.echip{width:12px;height:17px;border-radius:3px;border:1px solid #0008;position:relative}
.deckChip{display:inline-block;width:12px;height:17px;border-radius:3px;background:#6b7280;border:1px solid #0008;box-shadow:1.5px 1.5px 0 #454b57;vertical-align:middle;margin-right:5px}
.echip.frz{transform:rotate(90deg);opacity:.45;margin:0 3px}
.pbar .zn.enZn,.pbar .zn.smZn{display:inline-flex;align-items:center;gap:3px}
.pbar .zn.planCard{padding:0;width:52px;height:30px;position:relative;overflow:hidden;border-radius:5px;vertical-align:middle}
.pbar .zn.planCard .pcNm{position:absolute;left:0;right:0;bottom:0;font-size:7px;line-height:1.1;background:#000a;padding:1px 2px;white-space:nowrap;overflow:hidden;text-shadow:0 1px 1px #000}
.zn .zIco{font-size:12px;filter:saturate(.85)}
.smSlot{display:inline-block;width:7px;height:14px;border-radius:2px;border:1px solid #4a5568;vertical-align:middle}
.smSlot.rel{background:#8a8f9c;border-color:#9aa0ad}
.smSlot.frz{background:#4a4d55;border-color:#4a4d55;opacity:.75}
.smSlot.empty{background:#1a2230}
/* 盤面 */
#board{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;justify-content:center;padding:8px;background:#0a0e14;border:1px solid var(--line);border-radius:10px}
.sq{aspect-ratio:2/1;border:1px dashed #33445c;border-radius:7px;position:relative;padding:2px}
.sq.baseSq{aspect-ratio:4/1;border-style:solid;border-color:#26354a;background:#111823}
.sq.centerRow{background:#141c2a}
.sq .rowlbl{position:absolute;left:3px;top:2px;font-size:9px;color:#4a5c74;pointer-events:none}
.sq.hl{outline:2px solid var(--gold);cursor:pointer;background:#2a2413}
.sq.hlAtk{outline:2px solid #e05555;cursor:pointer}
/* ユニットミニカード */
.uc{width:100%;height:100%;border-radius:6px;padding:3px 4px;font-size:10px;line-height:1.25;overflow:hidden;border:1px solid #000;position:relative;color:#fff}
.uc .nm{font-weight:bold;font-size:10px;white-space:nowrap;overflow:hidden}
.uc .st{position:absolute;bottom:2px;left:4px;right:4px;display:flex;justify-content:space-between;font-size:10.5px;font-weight:bold}
.uc.frz{transform:rotate(6deg) scale(.92);opacity:.72}
.uc.frz::after{content:"⏸凍結";position:absolute;top:2px;right:3px;font-size:9px;color:#ffd}
.uc .dmg{position:absolute;top:14px;right:3px;color:#ff8a8a;font-size:9.5px;font-weight:bold}
.uc.selu{outline:2px solid #7fd3ff}
.uc.hlu{outline:2px solid var(--gold);cursor:pointer}
.uc.hlTgt{outline:2px dashed #ff7f7f;cursor:pointer}
.uc.own{box-shadow:0 0 0 2.5px #58a6ffcc, 0 2px 6px #000a}
.uc.foe{box-shadow:0 0 0 2.5px #ff5f5fcc, 0 2px 6px #000a}
.uc .artlayer{position:absolute;inset:0;background-size:cover;background-position:center;border-radius:6px;z-index:0}
.uc.foe .artlayer{transform:rotate(180deg)}
.uc .nm,.uc .dmg,.uc .st{position:relative;z-index:1}
.uc .st{z-index:1}
.ownArrow{font-size:9px}
.uc .accel{position:absolute;top:1px;left:3px;font-size:13px;z-index:2;filter:drop-shadow(0 0 2px #000);pointer-events:none}
.uc .smNow{color:#8fff9f;font-weight:bold}
.uc.canSmash::before{content:"";position:absolute;inset:0;border-radius:6px;box-shadow:inset 0 0 0 2px #7fff9fbb,0 0 7px 1px #7fff9f66;z-index:1;pointer-events:none}
/* フェイズトラック */
.phc{padding:1px 3px;color:var(--dim);font-size:11px;white-space:nowrap}
.phc.cur{color:var(--gold);font-weight:bold}
.phArw{color:#4a5c74;font-size:10px}
/* 手札 */
#handRow{display:flex;gap:5px;flex-wrap:wrap;min-height:96px;padding:5px;background:var(--panel);border:1px solid var(--line);border-radius:8px}
.hc{width:108px;height:88px;border-radius:7px;border:1px solid #000;padding:4px 5px;font-size:10px;line-height:1.3;position:relative;color:#fff;overflow:hidden}
.hc .nm{font-weight:bold;white-space:nowrap;overflow:hidden;font-size:10.5px}
.hc .cost{font-size:10px;opacity:.95}
.hc .typ{position:absolute;bottom:2px;left:5px;font-size:9px;opacity:.9}
.hc .ps{position:absolute;bottom:2px;right:5px;font-size:10px;font-weight:bold}
.hc.playable{cursor:pointer;box-shadow:0 0 0 2px var(--gold)}
.hc.playable:hover{transform:translateY(-3px)}
/* プロンプト */
#prompt{display:flex;gap:8px;align-items:center;padding:7px 10px;background:#241d10;border:1px solid var(--gold);border-radius:8px;min-height:44px;flex-wrap:wrap}
#prompt .msg{color:var(--gold);font-weight:bold}
/* サイド */
#side h3{padding:6px 10px;font-size:12px;color:var(--gold);border-bottom:1px solid var(--line)}
#stackWrap{display:flex;flex-direction:column;overflow:hidden}
#stackBox{padding:5px 8px;overflow-y:auto;max-height:230px}
#stackBox .stkHd{font-size:10px;color:var(--dim);margin-bottom:4px}
#stackBox .stkList{display:flex;flex-direction:column;gap:4px}
#stackBox .si{font-size:11px;padding:4px 6px;margin:0 0 4px;background:var(--panel2);border-left:3px solid var(--gold);border-radius:5px}
#stackBox .si.foe{background:#2a1717}
#stackBox .si.mine{background:#14202f}
.siHd{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--dim);margin-bottom:2px}
.siOwn{padding:0 5px;border-radius:7px;font-weight:bold}
.siOwn.mine{background:#1d3a5f;color:#9fd0ff}
.siOwn.foe{background:#5a2020;color:#ffb0b0}
.siNext{margin-left:auto;color:#ffd27f}
.siBt{color:#ffb0b0}
.siNm{font-weight:bold;font-size:11.5px}
.siTx{font-size:9.5px;color:var(--dim);line-height:1.35;margin-top:1px}
.siTgt{font-size:10px;color:#a8c6e0;margin-top:2px;line-height:1.3}
.stkToggle{width:100%;margin-top:2px;font-size:10.5px;padding:3px}
/* スタックの1行ヘッダ(畳んだら1行、タップ/🔻で全件展開) */
#stackBox .stkLine{display:flex;align-items:center;gap:6px;font-size:11.5px;padding:4px 5px;border-radius:5px;cursor:pointer}
#stackBox .stkLine:hover{background:var(--panel2)}
#stackBox .stkLine.empty{color:var(--dim);cursor:default}
#stackBox .stkTtl{color:var(--gold);font-weight:bold;font-size:11px;flex:0 0 auto}
#stackBox .stkChev{color:var(--gold);font-size:10px;flex:0 0 auto}
#stackBox .stkNext{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#stackBox .stkNext b{color:#ffe6a6}
#stackBox .stkCnt{color:var(--dim);font-size:10px;flex:0 0 auto}
#stackBox .stkList{margin-top:4px}
#log{flex:1;overflow-y:auto;padding:6px 10px;font-size:11.5px;line-height:1.7}
#log .me{color:#9fd0ff}#log .ai{color:#ffa0a0}#log .sys{color:var(--dim)}#log .imp{color:var(--gold);font-weight:bold}
/* ===== スマホ対応: 縦積み・盤面フィット・手札横スクロール・操作は下固定・ログは下引き出し ===== */
@media (max-width:820px){
 /* ヘッダ: スマホではタイトル＋☰のみ。☰でコントロールを展開表示 */
 #hdr{flex-wrap:wrap;gap:6px;padding:5px 8px}
 #hdr .hdrTitle{font-size:13px}
 #verLbl,#hdr .hspace{display:none}
 #hdrMenuBtn{display:inline-block;flex:0 0 auto;margin-left:auto;padding:4px 12px;font-size:16px;line-height:1}
 #hdrControls{display:none;flex-basis:100%;flex-wrap:wrap;gap:6px;margin-top:4px}
 #hdr.hdrOpen #hdrControls{display:flex}
 #hdrControls label{display:flex;align-items:center;gap:5px;flex-basis:100%}
 #hdrControls button{flex:0 0 auto}
 #main3{flex-direction:column;overflow-y:auto}
 #paneL{display:none}   /* 中身(ターン/フェイズ・スタック)は中央ペイン下部へ移動 */
 /* 中央ペインの並び: 相手バー→盤面→自分バー→フェイズ→スタック→操作枠→手札(最下部) */
 #paneC{position:relative}
 #paneC>#pbar1{order:1}
 #paneC>#board{order:2}
 #paneC>#pbar0{order:3}
 #paneC>#turnStrip{order:4}
 #paneC>#stackWrap{order:5}
 #paneC>#prompt{order:6}
 #paneC>#handRow{order:7}
 #turnStrip{justify-content:flex-start}
 /* フェーズ帯は常に独立した行に(バトル中の短い表示が対戦記録ボタンの右に回り込むのを防ぐ)。溢れる時だけ横スクロール */
 #phTrack{overflow-x:auto;max-width:100%;flex-basis:100%;order:2}
 #turnStrip{flex-wrap:wrap}
 #turnStrip>#logBtn{order:1}
 .phc{padding:1px 4px;font-size:10px}
 .phArw{font-size:8px;margin:0 1px}
 #stackWrap{min-height:0;flex:0 0 auto}
 #stackBox{max-height:34vh}
 #paneC{width:auto;min-width:0;align-items:stretch;padding:6px}
 #paneC .pbar,#paneC #prompt,#paneC #handRow,#paneC #board{max-width:none}
 .pbar{font-size:11px;gap:5px}
 .pbar .pbDeck{display:none}   /* スマホはデッキ名を省いて1行に寄せる */
 .pbar .nm{min-width:0}
 .pbar .zn.planCard{width:64px;height:36px}   /* プランカードはタップしやすく少し大きく */
 #handRow{flex-wrap:nowrap;overflow-x:auto;min-height:0}
 .hc{flex:0 0 96px}
 #prompt{box-shadow:0 -3px 8px #0007}
 /* 対戦記録: ターン行の📋ボタンで、右からせり出すパネル */
 #logBtn{display:inline-block;margin-left:auto;font-size:11px;padding:3px 9px;flex:0 0 auto}
 #paneR{position:fixed;top:0;right:0;bottom:0;width:88%;max-width:380px;z-index:75;transform:translateX(100%);transition:transform .2s;border-left:1px solid var(--line);border-top:none;box-shadow:-6px 0 24px #000b;background:var(--panel)}
 #paneR.open{transform:translateX(0)}
 #paneR #logToggle{display:block;writing-mode:horizontal-tb;width:100%;height:auto;text-align:left;border-bottom:1px solid var(--line);background:var(--panel2)}
 #logBackdrop.on{display:block}
 #paneR #logInner{display:flex}
 #paneR.open #logInner{max-height:none}
 /* デッキ選択: カードをタップで操作シートを開閉(案B)。PCは常時表示のまま。
    #mB のID詳細度で、後方の基本ルールに確実に勝たせる(既定は全部閉じる)。 */
 #mB .deckRow{flex-direction:column;align-items:stretch}
 #mB .deckInfo{cursor:pointer;position:relative;padding-right:20px}
 #mB .deckInfo::after{content:"▾";position:absolute;right:2px;top:2px;color:var(--dim);font-size:12px}
 #mB .deckRow.open .deckInfo::after{content:"▴"}
 #mB .deckRow .deckBtns{display:none;width:100%;margin-top:8px}   /* 既定は閉じる */
 #mB .deckRow.open{background:#20242e}
 #mB .deckRow.open .deckBtns{display:flex}                        /* タップで開いた行だけ表示 */
 #mB .deckRow .deckBtns button{flex:1 1 40%;padding:8px 4px;font-size:12px}
 /* モーダルを画面いっぱいに近づけて余白を減らす */
 #mdl{width:96%;max-height:90vh}
 #mdl .bd{padding:8px 10px}
}
/* モーダル */
#ovl{position:fixed;inset:0;background:#000b;display:none;align-items:center;justify-content:center;z-index:60}
#ovl.on{display:flex}
#mdl{background:var(--panel);border:2px solid var(--gold);border-radius:12px;max-width:780px;width:94%;max-height:86vh;display:flex;flex-direction:column}
#mdl h3{padding:10px 14px;color:var(--gold);font-size:14px;border-bottom:1px solid var(--line)}
#mdl .bd{padding:10px 14px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:6px;min-height:0}
#mdl .ft{padding:8px 14px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.mc{width:130px;min-height:100px;border-radius:7px;border:1px solid #000;padding:5px 6px;font-size:10.5px;line-height:1.35;color:#fff;cursor:pointer;position:relative}
.mc.sel{outline:3px solid var(--gold)}
.mc .tx{font-size:9.5px;opacity:.92;margin-top:2px}
.mc.static{cursor:default}
/* デッキ選択: 上部固定ヘッダ＋一覧スクロール */
#mB.dsMode{padding-top:0;display:block}
.dsHead{position:sticky;top:0;background:var(--panel);z-index:3;padding:8px 0 6px;border-bottom:1px solid var(--line);margin-bottom:6px}
.dsHeadRow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dsTitle{color:var(--gold);font-size:14px}
.dsStatus{font-size:12.5px}
.dsList{display:flex;flex-direction:column;gap:6px}
/* デッキ選択の行(PC=横並び / スマホ=縦積み) */
.deckRow{width:100%;display:flex;gap:6px;align-items:center;padding:6px 8px;border:1px solid var(--line);border-radius:8px;position:relative;overflow:hidden}
.deckInfo{flex:1;min-width:0;position:relative;z-index:2}
.deckBtns{display:flex;gap:6px;flex-wrap:wrap;flex:0 0 auto;position:relative;z-index:2}
/* デッキの"顔"アートを右側に扇状に薄く敷く */
.deckArt{position:absolute;top:0;right:0;bottom:0;width:150px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;opacity:.32;pointer-events:none;z-index:0}
.deckArt .dcard{width:50px;height:70px;border-radius:5px;background-size:cover;background-position:center;box-shadow:0 2px 6px #000a;margin-left:-22px}
.deckArt .dcard:nth-child(1){transform:rotate(-7deg) translateY(3px)}
.deckArt .dcard:nth-child(2){transform:rotate(0deg) translateY(-3px);z-index:1}
.deckArt .dcard:nth-child(3){transform:rotate(7deg) translateY(3px)}
/* 左からパネル色→透明のグラデでテキスト可読性を確保 */
.deckRow::before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(90deg,var(--panel) 45%,rgba(20,25,34,.35) 75%,transparent 100%)}
input[type=text]{background:#0d131c;border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:5px 8px;width:100%}
#inspect{position:fixed;left:8px;top:220px;width:340px;max-height:calc(100vh - 240px);overflow-y:auto;z-index:80;pointer-events:none;display:none;
 background:var(--panel);border-radius:10px;padding:10px 12px;font-size:12.5px;line-height:1.7;box-shadow:0 4px 20px #000c}
#inspect .iart{width:100%;height:180px;border-radius:8px;background-size:cover;background-position:center;margin-bottom:6px;border:1px solid var(--line)}
#inspect .inm{font-weight:bold;font-size:14px;margin-bottom:3px}
#inspect .imeta{color:var(--dim);font-size:11px}
#inspect .itx{margin-top:6px;padding-top:6px;border-top:1px solid var(--line);font-size:12px}
#inspect .inow{margin-top:4px;color:#9fe0a0;font-size:11.5px}
/* スマホ: カード詳細を画面内(下部・ほぼ全幅)に。基本ルールより後に置いて確実に上書き */
@media (max-width:820px){
 /* 詳細は左上からせり出す(手札と被らせない) */
 #inspect{left:0;right:auto;top:46px;bottom:auto;width:76%;max-width:300px;max-height:76vh;overflow-y:auto;border-radius:0 12px 12px 0;transform:translateX(-100%);transition:transform .18s;display:block !important;visibility:hidden}
 #inspect.show{transform:translateX(0);visibility:visible}
 #inspect.lower{top:auto;bottom:118px;max-height:52vh}   /* 選んだカードが上寄りの時は下側に出す(かぶり回避) */
 #inspect .iart{height:130px}
}
label.row{display:block;margin:7px 0;font-size:12.5px}

async function payForImpl(pi,cost,label){

 if(p.isAI||G.headless){payCost(p,cost);return true;}
 const manual=$("manualPay").checked;
 // 生命の門(200)など: 支払いに使った「対象エネ」も効果解決で場に出るため、
 // どのエネで色/無色を払うかによって手元に残る資源(=フェアリー移動用など)が変わる。
 // よって対象エネがある時は常に手動選択(色エネの充て先も含めて)を出す。

 if(cost.n===0||!manual){payCost(p,cost);renderAll();return true;}
 // 無色に使える種類が1つしかなければ選択不要
 const coloredUsed={};for(const c in cost.c)coloredUsed[c]=cost.c[c];

 p.energy.forEach(e=>{if(!e.frozen){const c=CARDS[e.no].col;if(coloredUsed[c]>0){coloredUsed[c]--;}else kinds.add(c);}});
 if(relSmash(p).length)kinds.add("SM");

 if(relEnergy(p).length+relSmash(p).length<=cost.total){payCost(p,cost);renderAll();return true;}

  .sort((a,b)=>cnt[CARDS[p.energy[b].no].col]-cnt[CARDS[p.energy[a].no].col]);

function strategyExtraOK(pi,no){

 if(fx.playCond&&!fx.playCond(pi))return false; // ペガサス・ウイング等

 }
 if(no===80){ // 冥界の門: 墓地ユニット+空きスクエア

  if(!p.grave.some(x=>CARDS[x].type==="U"&&(!p.isAI||totalCost(x)<=mx)))return false;
 }
 if(p.isAI&&no===40){const mx=maxXFor(p,cost);if(!units().some(u2=>u2.ctrl!==pi&&Math.ceil(Math.max(1,effPow(u2)-u2.dmg)/1000)<=mx))return false;}
 if(fx.tgt){

/* ユニットを出せるスクエア(通常の自軍/中央 + 召集マス)と、召集マス集合を返す */

 for(const r of [homeRow(pi),2])for(let c=0;c<3;c++){const o=uAt(r,c);if(!o||o.ctrl!==pi)sqs.push([r,c]);}

 for(let c=0;c<3;c++){const bb=G.bases[pi][c];if(bb&&FX[bb.no]&&FX[bb.no].convoke)convokes.push({scope:FX[bb.no].convoke,r:-1,c});}
 for(const cv of convokes)for(let r=1;r<=3;r++)for(let c=0;c<3;c++){

 }

async function runGame(){
 while(!G.over){
  const p=G.pl[G.ap];
  p.aiFlags.moved=0;
  G.phase="リリース";
  units().forEach(u=>{if(u.ctrl===G.ap)u.frozen=false;});
  p.energy.forEach(e=>e.frozen=false);p.smash.forEach(s=>s.frozen=false);
  renderAll();
  if(!(G.turnNo===0)){G.phase="ドロー";drawN(p,1);checkLoss();if(G.over)break;}
  G.phase="エネルギー";renderAll();
  await energyPhase(p);
  G.phase="メイン";renderAll();
  await priorityRound("main");if(G.over)break;
  G.phase="スマッシュ";renderAll();
  await smashPhase(p);if(G.over)break;
  G.phase="リカバリー";
  units().forEach(u=>{u.dmg=0;u.temp=u.temp.filter(t=>t.until!=="eot");if(u.granted)u.granted=u.granted.filter(g=>g.until!=="eot");});
  for(const u of units()){if(FX[u.no]&&FX[u.no].eotGrave){toGrave(u,"ターン終了時");}}
  processRules();if(G.over)break;
  renderAll();
  G.turnNo++;G.ap=other(G.ap);
  log(`--- ${G.pl[G.ap].name}のターン${Math.floor(G.turnNo/2)+1} ---`,"imp");
 }
 endGame();
}
async function energyPhase(p){

 else{no=p.isAI?aiEnergyChoice(p):await humanPickHand(p,"エネルギーに置くカードを選択（任意）",true);krec("energy",no);}

async function smashPhase(p){

  if(!cands.length)return;

  else{u=p.isAI?aiSmashChoice(p,cands):await humanPickSmash(p,cands);krec("smash",u?u.uid:null);}
  if(!u)return;
  u.frozen=true;
  const n=smVal(u)+(u.r===homeRow(other(p.i))?1:0);
  if(n>0){deckTopToSmash(G.pl[other(p.i)],n);log(`${p.name}: ${u.d.name} でスマッシュ! 相手に${n}枚`,"imp");}
  else log(`${p.name}: ${u.d.name} をフリーズ(スマッシュ0)`,p.i?"ai":"me");

}

function targetableUnits(){

function tgtMatch(c,d){
 if(d.kind!==undefined&&c.kind!==d.kind)return false;
 if(d.uid!=null)return c.u&&c.u.uid===d.uid;
 if(d.ei!=null)return c.ei===d.ei&&c.no===d.no;
 if(d.pi!=null&&d.c!=null&&d.uid==null)return c.pi===d.pi&&c.c===d.c;

 const sorted=p.hand.slice().sort((a,b)=>totalCost(b)-totalCost(a));

 if(deckArchetype(p)==="aggro"){
  const isCheapSmasher=no=>CARDS[no].type==="U"&&(CARDS[no].sm||0)>=1&&totalCost(no)<=3;
  if(energyN>=4)return null;                                    // 十分なエネ → 埋めない(手札を吐いて詰める)
  const cnt={};p.hand.forEach(x=>cnt[x]=(cnt[x]||0)+1);

  // 速攻(レイザー/ブラスト)は詰めの切り札で手札1体あれば十分 → 余剰(2体目以降)は埋めてよい。
  let keptHaste=false, keptSoul=0;

function aiSmashChoice(p,cands){

 if(!good.length)return null;

 const totalAvail=good.reduce((s,u)=>s+val(u),0);
 const oppRoom=7-opp.smash.length;
 // リーサル: 今スマッシュで勝てるなら迷わず殴る
 if(totalAvail>=oppRoom)return good.sort((a,b)=>val(b)-val(a))[0];
 // アグロ: 壁温存せず削り続けて相手の残枠(oppRoom)を詰め、一気詰めの射程に入れる。
 if(deckArchetype(p)==="aggro")return good.sort((a,b)=>val(b)-val(a))[0];

 const oppThreat=incoming>0;
 const numSmashers=good.length;                      // このターン殴れるユニット数
 const backup=units().some(u=>u.ctrl===pi&&!good.includes(u)&&(u.d.sm||0)>=0) // 殴らず残せる別ユニット
   ||p.hand.some(no=>CARDS[no].type==="U"&&canPay(p,parseCost(CARDS[no].play))) // 即出せる手札ユニット
   ||(p.planUp&&p.deck.length&&CARDS[p.deck[p.deck.length-1]].type==="U");      // プランのユニット

 const losingRace=oppThreat&&myClock>oppClock+0.5;
 if(losingRace&&!(numSmashers>=2||backup))return null; // 壁として温存して受ける(チマチマ殴らない)

function boardSmashOnly(pi){

  if(u.ctrl!==pi||u.frozen)continue;              // フリーズ中は今ターン殴れない
  const sm=smVal(u);
  if(u.r===enemyRow){chunks.push({sm:sm+1,cost:0});continue;}
  if(!u.d.move){if(u.r===2)chunks.push({sm,cost:0});continue;}
  const mv=parseCost(u.d.move).total||1;

// 手札にある「払えるバトルパンプ」の最大パワー上昇量。詰めで敵陣のブロッカーを討ち抜くのに使う。
//  30 チャレンジャー・ソウル(+4000/敵軍エリアの自軍) / 32 ルビー(赤+3000) / 190 レインボー(+2000) / 192 エメラルド(緑+3000)
function aggroMaxPump(p){
 const PUMP={30:4000,32:3000,190:2000,192:3000};
 let m=0;
 for(const no of p.hand){ if(PUMP[no]&&canPay(p,parseCost(CARDS[no].play)))m=Math.max(m,PUMP[no]); }
 return m;
}
// pi が「今ターンに実際に出せる最大スマッシュ」を、盤面ユニットの移動＋手札の速攻の展開込みで、
// 残エネルギー(無色払い予算)の範囲で貪欲に見積もる。速攻を「勝てるターンだけ」出す判定に使う。
function aggroReachThisTurn(pi){
 const p=G.pl[pi], enemyRow=homeRow(other(pi));
 let budget=relEnergy(p).length+relSmash(p).length;
 const chunks=[];
 for(const u of units()){                                   // 盤面の非フリーズユニット
  if(u.ctrl!==pi||u.frozen)continue;
  const sm=smVal(u);
  if(u.r===enemyRow){chunks.push({sm:sm+1,cost:0});continue;}
  if(!u.d.move){if(u.r===2)chunks.push({sm,cost:0});continue;}
  const mv=parseCost(u.d.move).total||1, dC=Math.abs(u.r-2), dE=Math.abs(u.r-enemyRow);
  if(u.r===2)chunks.push({sm,cost:0,up:{sm:1,cost:mv}});
  else chunks.push({sm,cost:mv*dC,up:{sm:1,cost:mv*(dE-dC)}});
 }
 // 敵陣まで抜けられる列がある時だけ、速攻のSM+1(敵陣着地)を見込む。
 // 中央が空き & 敵陣が「空き or 握ったパンプ(チャレンジャー等)で討てるブロッカー」なら抜けられる。
 const _pump=aggroMaxPump(p), _hp=Math.max(0,...p.hand.filter(no=>FX[no]&&FX[no].haste).map(no=>CARDS[no].pow||0));
 const openDeep=[0,1,2].some(c=>{ if(uAt(2,c))return false; const e=uAt(enemyRow,c); if(!e)return true; return e.ctrl!==pi&&(_hp+_pump)>effPow(e); });
 for(const no of p.hand){                                   // 手札の速攻: 出して中央でSM、敵陣まで抜ければSM+1
  if(!(FX[no]&&FX[no].haste))continue;
  const pc=parseCost(CARDS[no].play).total||0, mc=parseCost(CARDS[no].move||"").total||1;
  chunks.push({sm:CARDS[no].sm||0, cost:pc+mc, up:openDeep?{sm:1,cost:mc}:null});
 }
 const hadSmasher=chunks.length>0;                          // 殴り手がいる(=ソウルの対象がいる)
 if(hadSmasher)for(const no of p.hand){                     // 手札のドラゴン・ソウル(SM+1): 中央止まりでも+1で届かせる切り札
  if(no===38)chunks.push({sm:1,cost:parseCost(CARDS[no].play).total||0});
 }
 chunks.sort((a,b)=>(b.sm/(b.cost+1))-(a.sm/(a.cost+1)));
 let total=0;
 for(const c of chunks){ if(c.cost<=budget){total+=c.sm;budget-=c.cost; if(c.up&&c.up.cost<=budget){total+=c.up.sm;budget-=c.up.cost;}} }
 return total;
}
function maxSmashAgainst(pi){
 const opp=other(pi);
 const enemyRow=homeRow(pi); // 相手がここに来るとSM+1
 let budget=G.pl[opp].energy.length; // 次ターンに使える無色移動予算(概算)
 // 各盤面ユニットが出せる(スマッシュ量, 必要移動コスト)の最良案を集める
 const chunks=[]; // {sm, cost}
 for(const u of units()){
  if(u.ctrl!==opp)continue;
  const sm=smVal(u);
  if(u.r===enemyRow){chunks.push({sm:sm+1,cost:0});continue;} // 既に敵陣: 移動不要
  if(!u.d.move){if(u.r===2)chunks.push({sm,cost:0});continue;} // 移動不可: 中央にいればSMのみ
  const mv=parseCost(u.d.move).total||1;
  const dCenter=Math.abs(u.r-2),dEnemy=Math.abs(u.r-enemyRow);
  // 敵陣まで行ければSM+1、中央止まりならSM。安い方の"中央SM"を基本に、余れば敵陣へ上乗せ
  if(u.r===2)chunks.push({sm,cost:0,up:{sm:1,cost:mv}});
  else chunks.push({sm,cost:mv*dCenter,up:{sm:1,cost:mv*(dEnemy-dCenter)}});
 }
 // 相手デッキの持ち味(最悪ケースの上振れ要因)を見込む
 const oppDeck=allNos(G.pl[opp]);
 const hasRelease=oppDeck.some(no=>[80,160,200].includes(no)||FX[no]&&(FX[no].haste||FX[no].convoke));
 const hasPump=oppDeck.some(no=>SMPUMP.has(no));
 // スマッシュ/コスト効率の高い順に予算を割り当て
 chunks.sort((a,b)=>(b.sm/(b.cost+1))-(a.sm/(a.cost+1)));
 let total=0,reached=0;
 for(const c of chunks){
  if(c.cost<=budget){total+=c.sm;budget-=c.cost;reached++;
   if(c.up&&c.up.cost<=budget){total+=c.up.sm;budget-=c.up.cost;}}
 }
 // 余った予算でリリース展開(門/速攻/召集): 追加アタッカーが敵陣で即スマッシュを想定(悲観的に多め)
 if(hasRelease&&budget>=3)total+=(budget>=6?3:2);
 // スマッシュ増幅札を持っていて、届くアタッカーがいる & エネルギーが残っていれば +1〜2 の上振れを見込む
 if(hasPump&&reached>0&&budget>=1)total+=(reached>=2?2:1);
 return total;
}
function potentialIncoming(pi){return maxSmashAgainst(pi);}
function isThreat(pi,u){return u.ctrl!==pi&&(u.r===2||u.r===homeRow(pi))&&(u.d.sm||0)>=0;}
function allNos(p){return p.deckDef.list.map(e=>typeof e==="number"?e:e.no);}
/* リリース状態で自軍エリアに出るユニットが、このターン中に稼げるスマッシュ枚数を見積もる。
   自軍→中央(SM) or 敵軍(SM+1) へ移動できるかを、残りエネルギーの無色支払い余力で概算。 */
function releaseSmashPotential(pi,no,energyLeft){
 const sm=CARDS[no].sm||0;
 const mv=parseCost(CARDS[no].move||"");
 // 中央へ1歩(sm) / 敵軍へ2歩(sm+1)。移動コストは色付き分も要るが概算で無色総額を使う
 const perMove=mv.total||1;
 if(energyLeft>=perMove*2)return sm+1; // 敵軍エリアまで到達
 if(energyLeft>=perMove)return sm;      // 中央まで
 return 0;                              // 動けない(自軍エリアはスマッシュ不可)
}
/* リリース展開系カードのリーサル価値。相手の残りスマッシュ枠に対して詰めに行けるなら高評価。
   mx=Xに充てられる無色余力。安いユニットを釣るほど移動用エネルギーが残る。 */
function releaseLethalScore(pi,cands,mx,fixedPay){
 const opp=G.pl[other(pi)];
 const room=7-opp.smash.length;
 // 盤面にいる自分のリリース済みユニットの追加スマッシュも合算(合わせて詰めるか)
 let boardSmash=0;
 for(const u of units())if(u.ctrl===pi&&!u.frozen){
  if(u.r===2)boardSmash+=smVal(u);else if(u.r===homeRow(other(pi)))boardSmash+=smVal(u)+1;
 }
 let best=-0.5;
 for(const no of cands){
  const payAfter=fixedPay!=null?fixedPay:Math.max(0,mx-totalCost(no)); // このユニットを釣った後の残エネルギー
  const pot=releaseSmashPotential(pi,no,payAfter);
  let s=0.3+pot*0.6;
  if(pot+boardSmash>=room)s=6;            // 盤面込みでリーサル
  else if(room<=3&&pot>0)s=Math.max(s,2.5+pot); // 相手瀕死: 詰めを詰める
  best=Math.max(best,s);
 }
 return best;
}
function aiDecide(pi,acts,timing){
 const p=G.pl[pi];
 if(deckArchetype(p)==="aggro")return aggroPolicy(pi,acts,timing); // アグロは決め打ちの専用ポリシー(ファジー評価をバイパス)
 const scored=acts.map(a=>({a,s:aiScore(pi,a,timing)+Math.random()*0.3})); // ジッターは記録した手に影響しないので非決定でよい(ゲーム乱数rndとは分離)
 scored.sort((x,y)=>y.s-x.s);
 return scored[0].a;
}
/* ===== アグロ(赤単速攻)の決め打ちポリシー =====
   ユーザーの手順を明示実装:
   ・自分のメインフェイズ: 手札ユニットは一切出さない(凍って動けず詰めに絡まないため)。移動で前進して殴る。SM底上げ/ベース/ドラゴンソウルは詰めの時だけ。
   ・相手のメインフェイズ: 手札からユニットを展開(同速かつ相手のいない列に置ける)。
       - 韋駄天丸(1)は「手札に2枚」or「既に盤面に1体」の時だけ(単体では弱いので2枚並べる)。
       - 最初のユニットは中央列(homeRow中央)、以降は相手ユニットのいない左右の列へ。
   ・プランは基本しない(相手が残6枚=瀕死の時だけフィニッシャーを掘る)。 */
function aggroPolicy(pi,acts,timing){
 const p=G.pl[pi], opp=G.pl[other(pi)], myTurn=G.ap===pi;
 const pass=acts.find(a=>a.t==="pass")||{t:"pass"};
 const scoreBest=(list)=>{let b=pass,bs=-1e9;for(const a of list){const s=aiScore(pi,a,timing);if(s>bs){bs=s;b=a;}}return b;};
 // バトル中/メイン以外はコンバットトリック等の通常評価に委譲
 if(timing!=="main"||G.battles.length)return scoreBest(acts);
 if(!myTurn){
  // 相手のメインフェイズ: 手札から通常(凍結)ユニットを展開(決め打ち)。速攻/ターン終了消滅は自分のターンに回す。
  return aggroPickDeploy(pi,acts)||pass;
 }
 // 自分のメインフェイズ:
 // (a) 速攻ユニット(レイザー/ブラスト)は「詰めターン」にしか出さない。その場で殴れる=リーサルのリーチを伸ばす切り札なので、削りでは温存。
 //     盤面が今ターン出せるスマッシュ + 速攻ぶんで相手を倒し切れる時だけ、出して中央へ運んで殴る。
 // (最優先) 速攻(レイザー等)が盤面にいて、まだ殴れる最深部(敵陣=SM+1)に達していないなら前進させて必ず殴りに行く。
 //  レイザーはターン終了で墓地に置かれるので、スマッシュを入れないと完全に無駄。前進を他の何より優先する。
 const enemyRow=homeRow(other(pi));
 const lethalTurn=opp.smash.length+aggroReachThisTurn(pi)>=7;        // 今ターン詰め切れる見込み
 const canCharge=!oppCanRespond(pi);                                 // 相手が迎撃不能=パンプで確実に勝てるブロッカーに特攻してよい
 // 速攻(必ず殴る)は常に、それ以外のスマッシャーは「詰めターン」に、前進させて殴りに行く。
 for(const u of units().filter(u=>u.ctrl===pi&&!u.frozen&&(u.d.sm||0)>=1&&u.r!==enemyRow&&((FX[u.no]&&FX[u.no].haste)||lethalTurn))){
  const mv=acts.find(a=>a.t==="move"&&a.uid===u.uid);
  if(!mv)continue;
  const closer=([r,c])=>Math.abs(r-enemyRow)<Math.abs(u.r-enemyRow);
  const fwd=mv.dests.filter(d=>closer(d)&&!uAt(d[0],d[1])); // 敵陣に近づく空きマス
  if(fwd.length){mv.to=fwd.sort((a,b)=>Math.abs(a[0]-enemyRow)-Math.abs(b[0]-enemyRow))[0];return mv;}
  // 空きが無い: 相手が迎撃不能 & 握ったパンプ(チャレンジャー等)で確実に討てる敵ブロッカーがいるなら、そこへ特攻(バトル→バトル中にパンプで勝ち、そのマスで殴る)。
  if(canCharge){
   const pump=aggroMaxPump(p);
   const fwdBeat=mv.dests.filter(d=>{if(!closer(d))return false;const o=uAt(d[0],d[1]);return o&&o.ctrl!==pi&&effPow(u)+pump>effPow(o);});
   if(fwdBeat.length){mv.to=fwdBeat.sort((a,b)=>Math.abs(a[0]-enemyRow)-Math.abs(b[0]-enemyRow))[0];return mv;}
  }
 }
 // (a) 速攻(レイザー等)を出すのは「そのターンに勝ち切れる」時だけ。ターン終了で消えるので、勝てないなら出す意味が無い。
 //  盤面+手札の速攻を残エネで貪欲に見積もった"今ターンの実際の最大スマッシュ"がリーサルに届く時のみ出す。
 const haste=acts.filter(a=>a.t==="playU"&&FX[a.no]&&FX[a.no].haste);
 if(haste.length){
  const oppRoom=7-opp.smash.length, hr=homeRow(pi), eAvail=relEnergy(p).length+relSmash(p).length;
  if(aggroReachThisTurn(pi)>=oppRoom){                                 // 今ターン勝ち切れる
   for(const a of haste.slice().sort((x,y)=>totalCost(x.no)-totalCost(y.no))){
    const pc=parseCost(CARDS[a.no].play).total||0, mc=parseCost(CARDS[a.no].move||"").total||1;
    if(eAvail-pc<mc)continue;                                          // 出して動かすエネが無い
    // 前方が空いてノーバトルで殴りに行ける列に置く。中央マスが埋まっている列は前進できないので不可。
    // 中央も敵陣も空きの列(最深=SM+1まで行ける)を最優先、中央だけ空きの列を次点に。
    // 置くマス自体が空き(敵がいれば迎撃バトルになり殴りに行けない) かつ 中央マスも空き=前進して殴れる列。
    // スタック上の未解決自軍ユニットが向かっているマスも除外(2枚重ね自壊防止)。
    const lanes=a.sqs.filter(([r,c])=>r===hr&&!uAt(r,c)&&!uAt(2,c)&&!pendingSelfUnitAt(pi,r,c))
                     .sort((A,B)=>(uAt(enemyRow,A[1])?1:0)-(uAt(enemyRow,B[1])?1:0)); // 敵陣も空きの列(SM+1)を優先
    if(!lanes.length)continue;                                         // 殴りに行ける列が無い → 温存
    a.sq=lanes[0]; return a;
   }
  }
  // 勝てない/殴りに行けないなら速攻(レイザー)は温存(出さない)
 }
 // (b) それ以外の手札ユニットは出さない。プランもしない(瀕死時のみ)。移動/詰め札を評価で最善手。
 let pool=acts.filter(a=>a.t!=="playU");
 if(opp.smash.length<6)pool=pool.filter(a=>a.t!=="planMake"&&a.t!=="planUpdate");
 const best=scoreBest(pool.length?pool:[pass]);
 // 負け際(次の相手ターンに詰まされる見込み)で自分のターンにやることが無い(パス)なら、手を無駄にせず
 // 手札からユニットを出して壁/攻め手にする(何もせずターンを終えない)。
 if(best.t==="pass"&&(p.smash.length+maxSmashAgainst(pi)>=7)){
  const dep=aggroPickDeploy(pi,acts);
  if(dep)return dep;
  const anyU=acts.filter(a=>a.t==="playU"&&!(FX[a.no]&&FX[a.no].eotGrave)); // 最後の手段: 出せるユニットを何でも壁に
  if(anyU.length){anyU.sort((a,b)=>totalCost(a.no)-totalCost(b.no));const a=anyU[0];a.sq=aggroPlace(pi,a);return a;}
 }
 return best;
}
function aggroPickDeploy(pi,acts){
 const p=G.pl[pi];
 const unitPlays=acts.filter(a=>a.t==="playU");
 if(!unitPlays.length)return null;
 const idaCount=p.hand.filter(x=>x===1).length;                          // 手札の韋駄天丸枚数
 const idaOnBoard=units().some(u=>u.ctrl===pi&&u.no===1);                // 盤面に韋駄天丸がいるか
 const dispTurn=Math.floor(G.turnNo/2)+1;                                // 表示上のターン数
 const ok=unitPlays.filter(a=>{
  if(FX[a.no]&&FX[a.no].haste)return false;                             // 速攻(レイザー/ブラスト)は詰めターン専用 → 通常展開しない
  // 韋駄天丸: 単騎は弱いのでペア(手札2枚 or 盤面に1体)前提。かつ2ターン目までは出さない(3ターン目以降にペア展開)。
  //   序盤(〜2ターン目)は2コストのウィニーを優先し、韋駄天丸は温存する。
  if(a.no===1)return (idaCount>=2||idaOnBoard)&&dispTurn>=3;
  return true;
 });
 if(!ok.length)return null;
 // 出す順: 安いスマッシャーから(2コスト以下優先、SM持ち優先)
 ok.sort((a,b)=> totalCost(a.no)-totalCost(b.no) || ((CARDS[b.no].sm||0)-(CARDS[a.no].sm||0)) );
 const chosen=ok[0];
 chosen.sq=aggroPlace(pi,chosen);
 return chosen;
}
// スタック上の未解決の自軍ユニットスペルが、このマスに向かっているか(=先に解決すると埋まって後発が自壊する)。
function pendingSelfUnitAt(pi,r,c){
 return G.stacks.some(st=>st.some(x=>x&&x.kind==="spell"&&x.ctrl===pi&&x.sq&&CARDS[x.no]&&CARDS[x.no].type==="U"&&x.sq[0]===r&&x.sq[1]===c));
}
function aggroPlace(pi,a){
 const hr=homeRow(pi);
 // 既にスタック上の自軍ユニットが向かっているマスは除外(2枚同じマスに出して自壊するのを防ぐ)。
 const usable=a.sqs.filter(([r,c])=>!pendingSelfUnitAt(pi,r,c));
 const sqs=usable.length?usable:a.sqs;
 const home=sqs.filter(([r,c])=>r===hr);                   // 自陣(homeRow)のマスに置く(凍って出て次ターン始動)
 const cand=home.length?home:sqs;
 const oppInCol=c=>units().some(u=>u.ctrl!==pi&&u.c===c);  // 相手ブロッカーのいる列(そのまま前進すると殴られる/加速で討たれる)
 const myInCol=c=>units().some(u=>u.ctrl===pi&&u.c===c);
 // 相手のいない列(=そのまま前進してノーバトルでスマッシュできる)を最優先。その中で中央列(まだ自軍がいなければ)を優先。
 const open=cand.filter(([r,c])=>!oppInCol(c));
 const pool=open.length?open:cand;
 const centerOpen=pool.find(([r,c])=>c===1&&!myInCol(1));
 if(centerOpen)return centerOpen;                           // 最初のユニットは中央列(空いていれば)
 const cleanLane=pool.find(([r,c])=>!myInCol(c));           // 自軍もいない綺麗な空き列(横に広げる)
 if(cleanLane)return cleanLane;
 return pool[0];
}
// エネ残し(応酬)の価値: 相手ターンに、除去/パンプ戦術 or 迎撃サモンで自軍を守れるよう
// エネを残したい。need=その最小コスト, val=構えておく価値。タップアウト抑止に使う。
// コンバットトリック(バトルでのみ価値: パンプ/加速付与/回避/防御)。メインでの無駄打ち抑止＆エネ残し判定で共用。
const COMBAT_TRICKS=new Set([30,32,72,112,152,155,190,192,189,110,149,153,158]);
// 手札から中央特攻して即「相手のリソースを削る」死亡誘発ユニット = 本体を犠牲にテンポを取る価値がある。
//  168 クレーター・メーカー(相手エネ破壊) / 49 スパイク・ガールズ・54 ディーペスト・パープル(相手ハンデス)。
// ドロー/自己再利用系(93 ファルコン・ケン等)はここに含めない = 本体を捨ててまで先に自殺せず、
// 自陣に出して壁/アタッカーとして使い、自然死(バトル/相手の中央プレイ)で無償にドローを拾う方が強い。
const SUICIDE_TEMPO_PIG=new Set([168,49,54]);
const DRAW_PIG=new Set([88,93,96,102]); // 死亡時にドローする系(ファルコン・ケン等)
// このユニットが「バトルで死ぬ」時に得られる死亡誘発の価値 = トレード評価で本体コストから割り引く分。
// 死亡誘発は自然死で無償に誘発するので、迎撃/相打ちで死んでもタダでは死なない(実質-1枚で1体1交換等)。
function pigTradeRebate(no){
 const fx=FX[no]; if(!fx)return 0;
 if(SUICIDE_TEMPO_PIG.has(no))return 0.8;   // 相手のエネ破壊/ハンデス(テンポ)
 if(DRAW_PIG.has(no))return 0.7;            // ドロー1枚ぶん
 if(fx.pigEnergyLoss)return -0.5;           // 自分のエネ破壊はデメリット(紅蓮朱雀/雷神丸)
 if(fx.pig)return 0.4;                       // その他(墓地回収など)
 return 0;

// デッキアーキタイプ判定: 低コスト(≤2)のスマッシャーが多い=アグロ(ウィニーで並べて一気に詰める)。

function deserializeAction(v){

   }
  }

 row.innerHTML=p.hand.map((no,i)=>handCardHTML(no,i,UI.playableHand&&UI.playableHand.has(i))).join("");
 row.querySelectorAll(".hc").forEach(el=>{el.onclick=()=>UI.onHand&&UI.onHand(+el.dataset.hi);});
 renderReplayOppHand(); // 棋譜再生中のみ相手手札をオープン表示(観戦/検討用)
}
// 棋譜再生(終局後の観戦/検討)専用: 相手の手札を表向きで全公開する。
// 表示は「REPLAY(再生セッション) かつ G._replay(再生フレーム描画中)」の両方が真のときだけ。
// 進行中のオンライン対戦では REPLAY=null かつ G._replay が偽なので、相手手札は絶対に漏れない。
function renderReplayOppHand(){
 let top=document.getElementById("handRowTop");
 const show=!!(REPLAY&&G&&G._replay); // 二重ガード: 再生セッション中の再生フレーム描画時のみ公開
 if(!show){ if(top)top.style.display="none"; return; }
 if(!top){
  top=document.createElement("div");
  top.id="handRowTop";
  top.style.cssText="display:flex;gap:5px;flex-wrap:wrap;min-height:0;padding:5px;background:var(--panel);border:1px solid var(--gold);border-radius:8px;margin-bottom:4px";
  const pb1=document.getElementById("pbar1");
  if(pb1&&pb1.parentNode)pb1.parentNode.insertBefore(top,pb1.nextSibling);
  else document.body.appendChild(top);
 }
 top.style.display="flex";
 const opp=G.pl[other(POV())]; // 相手プレイヤー(POVでない側)
 const lbl=`<div style="width:100%;font-size:10px;color:var(--gold);margin-bottom:2px">🎞 相手の手札(棋譜再生・全公開) ${opp.hand.length}枚</div>`;
 // handRowTop 内のカードには handRow 用のクリック束縛が付かないため、閲覧専用(inert)になる
 top.innerHTML=lbl+opp.hand.map((no,i)=>handCardHTML(no,i,false)).join("");
}
function renderStack(){
 const sb=$("stackBox");
 const items=[];
 G.stacks.forEach((s,si)=>s.forEach(it=>items.push({it,battle:si>0})));
 items.reverse(); // items[0] = 次に解決(LIFO)
 if(!items.length){sb.innerHTML='<div class="stkLine empty"><span class="stkTtl">スタック</span><span class="stkNext">（空）</span><span class="stkChev">▽</span></div>';UI.stackOpen=false;return;}
 const one=(o,idx)=>{
  const it=o.it, no=it.no, card=(no!=null&&CARDS[no])?CARDS[no]:null;
  const owner=it.ctrl;
  const ownLbl=owner==null?"":(owner===POV()?"自分":"相手");
  const ownCls=owner==null?"":(owner===POV()?"mine":"foe");
  const kind=card?(card.type==="U"?"ユニット":card.type==="B"?"ベース":card.type==="S"?"スペル":"能力"):(it.kind==="spell"?"スペル":"能力");
  const kico=kind==="ユニット"?"🃏":kind==="スペル"?"✦":"✨";
  const name=card?card.name:(it.label||it.kind||"効果");
  const desc=card&&card.text?card.text:"";
  const col=card?card.col:null;
  // 対象(ユニット/ベース/エリア/数値)と配置先スクエアを表示。何を対象にしているか分かるように。
  const tgtLbl=(it.tgts&&it.tgts.length)?it.tgts.map(t=>t.label).filter(Boolean).join(" ・ "):"";
  const sqLbl=(it.sq&&it.kind!=="move")?sqName(it.sq[0],it.sq[1],POV()):"";
  const tgtLine=tgtLbl?`<div class="siTgt">🎯 対象: ${tgtLbl}</div>`:"";
  const sqLine=sqLbl?`<div class="siTgt">📍 ${sqLbl}</div>`:"";
  return `<div class="si ${ownCls}" ${no!=null?`data-no="${no}"`:""} style="${col?`border-left-color:var(--${col})`:""}">
    <div class="siHd">${ownLbl?`<span class="siOwn ${ownCls}">${ownLbl}</span>`:""}<span class="siKind">${kico}${kind}</span>${o.battle?'<span class="siBt">⚔バトル</span>':""}${idx===0?'<span class="siNext">← 次に解決</span>':""}</div>
    <div class="siNm">${name}</div>${desc?`<div class="siTx">${desc}</div>`:""}${tgtLine}${sqLine}</div>`;
 };
 const nm=o=>{const it=o.it,card=(it.no!=null&&CARDS[it.no])?CARDS[it.no]:null;return card?card.name:(it.label||it.kind||"効果");};
 // PCは常に展開(左ペインに余裕あり)。スマホは畳んで1行、タップで全件展開。
 const open = (typeof IS_TOUCH!=="undefined" && !IS_TOUCH) ? true : !!UI.stackOpen;
 const head=`<div class="stkLine" onclick="UI.stackOpen=!UI.stackOpen;renderStack()" title="タップで${open?"折りたたむ":"全件表示"}">`+
   `<span class="stkTtl">スタック</span>`+
   `<span class="stkNext">次に解決:<b>《${nm(items[0])}》</b></span>`+
   (items.length>1?`<span class="stkCnt">他${items.length-1}件</span>`:"")+
   `<span class="stkChev">${open?"▲":"▽"}</span>`+
   `</div>`;
 sb.innerHTML=head+(open?`<div class="stkList">${items.map((o,i)=>one(o,i)).join("")}</div>`:"");
}

 document.querySelectorAll(".uc").forEach(el=>{el.classList.remove("hlu","hlTgt");});
 (UI.hl||[]).forEach(h=>{

  if(h.base){const el=document.querySelector(`[data-base="${h.base[0]},${h.base[1]}"]`);if(el){el.classList.add("hl");el.onclick=()=>h.cb();}}
 });

function prompt2(msg,btns){
 $("pMsg").textContent=msg;
 const box=$("pBtns");box.innerHTML="";
 btns.forEach(([label,cb,primary,dno])=>{const b=document.createElement("button");if(primary)b.className="primary";b.textContent=label;if(dno!=null)b.dataset.no=dno;b.onclick=cb;box.appendChild(b);});
}
// 投了(ヘッダのボタンから)。誤操作防止のため必ず確認を挟む。待機中の選択があればそれをパスで解決する。
function doConcede(){
 if(G.over){alert("この対局はすでに終了しています。");return;}
 if(!confirm("投了しますか？\nこの対局はあなたの負けになります。"))return;
 if(ONLINE.active){
  ONLINE.ended=true;
  olWriteFinish(ONLINE.oppUid,"concede"); // 相手の勝ち
  olReleaseWaiters();           // 相手決定の受信待ちを解放
  olStopHeartbeat(); olClearTurnTimer(); olClearOppTimer(); olHideDcHud();
  rtcCleanup(true); // 音声通話も終了(マイク停止・PC close・購読解除・UI撤去)
  if(UI.concede){ try{UI.concede();}catch(e){} } // 自分のプロンプトを解決
  G.over=true; G.winner=other(ONLINE.myIndex);
  olRecordOwnStats({winnerUid:ONLINE.oppUid, reason:"concede"});
  log("あなたは投了しました","imp"); renderAll();
  return;
 }
 if(UI.concede)UI.concede();
 else{G.over=true;G.winner=1;log("あなたは投了した","imp");renderAll();}
}
async function humanChoose(pi,acts,timing){
 if(!ONLINE.active) return humanChooseCore(pi,acts,timing);
 if(olIsCatchup() || pi!==ONLINE.myIndex){ // 相手の手番/復帰再生: プロンプトを出さず受信して適用
  const v=await olRecvMove("act");
  if(v==null)return {t:"pass"}; // 再生でデータが尽きた等: パス扱いで安全に畳む(G.overで各ループが停止)
  return deserializeAction(v);
 }
 // 自分の手番: 内部の対象/ベース選択は行動オブジェクトに含めて丸ごと同期するため _inMyAction で個別同期を抑止
 // 手番タイマー: 90秒放置なら自動で「優先権放棄(パス)」。連続3回で時間切れ負け(olRunMyDecision内)。
 let a=await olRunMyDecision(()=>{
  ONLINE._inMyAction=true;
  return Promise.resolve(humanChooseCore(pi,acts,timing)).finally(()=>{ ONLINE._inMyAction=false; });
 }, ()=>{ ONLINE._inMyAction=false; return {t:"pass"}; });
 if(!ONLINE.ended) await olSendMove("act", serializeAction(a));
 return a;
}
async function humanChooseCore(pi,acts,timing){
 const p=G.pl[pi];
 const passOnly=acts.length===1;
 if(passOnly&&$("autoPass").checked){await sleep(60);return acts[0];}
 return new Promise(res=>{
  const finish=a=>{UI.concede=null;clearIx();prompt2("処理中...",[]);renderAll();res(a);};
  // 投了はプロンプト列から外し、ヘッダの投了ボタン(doConcede)から実行。待機中の選択をパスで解決して確定する。
  UI.concede=()=>{G.over=true;G.winner=1;log("あなたは投了した","imp");finish({t:"pass"});};
  function clearIx(){UI.hl=[];UI.playableHand=new Set();UI.onHand=null;UI.onDeck=null;UI.onPlan=null;renderHand();renderBoard();renderPbar(0);}
  const handActs={};
  acts.forEach(a=>{if(a.hi!=null)handActs[a.hi]=a;});
  function buildBtns(){
   const bb=[[passLabel(),()=>finish({t:"pass"}),true]];
   acts.forEach(a=>{
    if(a.t==="planMake")bb.push(["プラン作成(無1)",()=>finish(a)]);
    if(a.t==="planUpdate")bb.push(["プラン更新(無1)",()=>finish(a)]);
    if(a.plan)bb.push([`プランから《${CARDS[a.no].name}》`,async()=>{
     clearIx();
     if(a.t==="playU"){const sq=await humanPickSquare(0,a.sqs,"出すスクエアを選択",true,true);if(!sq)return reprompt();finish({...a,sq});}
     else if(a.t==="playB"){const col=await humanPickBaseCol(a.cols);if(col==null)return reprompt();finish({...a,col});}
     else finish(a);
    },false,a.no]);
   });
   return bb; // 投了ボタンはここに置かない(誤タップ防止のためヘッダへ移動)
  }
  function reprompt(){
   // 山札/プランのクリック操作
   const pmAct=acts.find(a=>a.t==="planMake");
   const puAct=acts.find(a=>a.t==="planUpdate");
   const ppActs=acts.filter(a=>a.plan);
   UI.onDeck=pmAct?()=>finish(pmAct):null;
   UI.onPlan=(puAct||ppActs.length)?()=>{
    const mbtns=[];
    ppActs.forEach(a=>mbtns.push([`《${CARDS[a.no].name}》をプレイ`,async()=>{
     clearIx();
     if(a.t==="playU"){const sq=await humanPickSquare(0,a.sqs,"出すスクエアを選択(赤枠=バトル)",true,true);if(!sq)return reprompt();finish({...a,sq});}
     else if(a.t==="playB"){const col=await humanPickBaseCol(a.cols);if(col==null)return reprompt();finish({...a,col});}
     else finish(a);
    },true,a.no]));
    if(puAct)mbtns.push(["プラン更新(無1): 墓地に送って次を公開",()=>finish(puAct)]);
    mbtns.push(["戻る",()=>reprompt()]);
    prompt2("プランゾーン:",mbtns);
   }:null;
   UI.playableHand=new Set(Object.keys(handActs).map(Number));
   UI.onHand=async hi=>{
    const a=handActs[hi];if(!a)return;
    clearIx();
    if(a.t==="playU"){
     const sq=await humanPickSquare(0,a.sqs,`《${CARDS[a.no].name}》を出すスクエアを選択(赤枠=バトル)`,true,true);
     if(!sq)return reprompt();
     finish({...a,sq});
    }else if(a.t==="playB"){
     const col=await humanPickBaseCol(a.cols);
     if(col==null)return reprompt();
     finish({...a,col});
    }else finish(a);
   };
   UI.hl=[];
   acts.forEach(a=>{
    if(a.t==="move"){
     UI.hl.push({uid:a.uid,cb:async()=>{
      const u=units().find(x=>x.uid===a.uid);
      clearIx();
      const sq=await humanPickSquare(0,a.dests,`${u.d.name}の移動先を選択(赤枠=バトル)`,true,true);
      if(!sq)return reprompt();
      finish({...a,to:sq});
     }});
    }
    if(a.t==="abil")UI.hl.push({uid:a.uid,cb:()=>finish(a)});
   });
   renderAll();prompt2(mkMsg(),buildBtns());applyHighlights();renderHand();
  }
  // パスすると次に何が起きるかを説明する
  function passOutcome(){
   const top=cur()[cur().length-1];
   if(top){
    const who=top.ctrl===POV()?"あなた":"相手";
    if(top.kind==="move"){const u=units().find(x=>x.uid===top.uid);const dest=top.to?sqName(top.to[0],top.to[1],0):"";return {short:`${who}の移動(→${dest})を解決`,long:`このまま進むと、${who}の《${u?u.d.name:"ユニット"}》が ${dest} へ移動します${dest.startsWith("敵軍")&&who==="相手"?"(相手の敵陣=あなたの本陣へ侵入)":""}`};}
    if(top.kind==="spell"){return {short:`${who}の《${CARDS[top.no].name}》を解決`,long:`このまま進むと、${who}の《${CARDS[top.no].name}》が解決されます`};}
    if(top.kind==="abil"){return {short:`${who}の能力を解決`,long:`このまま進むと、${who}の《${CARDS[top.no].name}》の能力が解決されます`};}
    if(top.kind==="bdmg")return {short:"バトルダメージを解決",long:"このまま進むとバトルダメージが与えられます"};
    if(top.kind==="trig")return {short:`${who}の誘発を解決`,long:`このまま進むと誘発効果が解決されます`};
    return {short:"解決を進める",long:"スタックの一番上を解決します"};
   }
   // スタックが空 = フェイズ/ステップ終了
   if(G.battles.length){const b=G.battles[G.battles.length-1];return {short:`バトル第${b.step}ステップを進める`,long:`バトルの第${b.step}ステップを進めます`};}
   if(G.ap===POV())return {short:"メインフェイズを終了",long:"あなたのメインフェイズを終了します(この後スマッシュフェイズへ)"};
   return {short:"相手のメインフェイズを進める",long:"優先権を返し、相手のメインフェイズを進めます(相手が続けて行動する場合があります)"};
  }
  function passLabel(){return "▶ 優先権放棄";} // ルール用語で統一。結果(フェイズ終了/解決)はスタック帯・バトル表示で分かる
  function mkMsg(){
   // 状況の一言 ＋ 「優先権放棄で何が起きるか」の💡ヒント(チップス)。行動自体はボタンで。
   let state, tip;
   if(cur().length){ state=`スタック ${cur().length}件`; tip="両者が優先権放棄でスタックを上から順に解決"; }
   else if(G.battles.length){ state=`⚔ バトル第${G.battles[G.battles.length-1].step}ステップ`; tip="両者が優先権放棄でバトルステップを進行"; }
   else {
    const P=["リリース","ドロー","エネルギー","メイン","スマッシュ","リカバリー"], i=P.indexOf(G.phase), nx=(i>=0&&i<5)?P[i+1]:null;
    if(G.ap===0){ state="あなたの手番"; tip=nx?`両者が優先権放棄で${nx}フェイズへ移行`:"両者が優先権放棄でターン終了"; }
    else { state="相手の手番・対応可"; tip="両者が優先権放棄で相手のターンが進行"; }
   }
   return `${state}　💡 ${tip}`;
  }
  reprompt();
 });
}
async function humanPickSquare(pi,sqs,msg,cancelable,markAtk){
 if(ONLINE.active && !ONLINE._inMyAction){
  if(olIsCatchup() || pi!==ONLINE.myIndex){ return await olRecvMove("sq"); }
  const r=await olRunMyDecision(()=>humanPickSquareCore(pi,sqs,msg,cancelable,markAtk),
    ()=> cancelable? null : (sqs[0]||null)); // 放置: 取消可ならキャンセル、強制なら最初の合法マス
  await olSendMove("sq",r); return r;
 }
 return humanPickSquareCore(pi,sqs,msg,cancelable,markAtk);
}
function humanPickSquareCore(pi,sqs,msg,cancelable,markAtk){
 return new Promise(res=>{
  UI.hl=sqs.map(sq=>({sq,atk:markAtk&&uAt(sq[0],sq[1])!=null,cb:()=>{UI.hl=[];res(sq);}}));
  const btns=[];
  if(cancelable)btns.push(["キャンセル",()=>{UI.hl=[];res(null);}]);
  prompt2(msg,btns);renderBoard();
 });
}
function humanPickBaseCol(cols){
 return new Promise(res=>{
  // ベース行の実座標は「設置するプレイヤーのベース索引」= POV()。
  // 先攻/オフラインは0(従来通り)、オンライン後攻は1。data-base は実座標なので
  // 反転表示でも自分側(下段)の正しいマスにハイライト/クリックが載る。
  const br=POV();
  UI.hl=cols.map(c=>({base:[br,c],cb:()=>{UI.hl=[];res(c);}}));
  prompt2("ベースを置くスクエアを選択",[["キャンセル",()=>{UI.hl=[];res(null);}]]);
  renderBoard();
 });
}
async function humanPickHand(p,msg,optional){

    ()=> optional? null : (p.hand.length?p.hand[0]:null)); // 放置: 任意ならスキップ、強制なら手札先頭
  await olSendMove("hand",r); return r;
 }
 return humanPickHandCore(p,msg,optional);

 });

async function humanPickTargets(pi,cands,n,upTo,msg,optional){
 if(ONLINE.active && !ONLINE._inMyAction){
  if(olIsCatchup() || pi!==ONLINE.myIndex){
   const v=await olRecvMove("tgt");
   if(v==null) return null;
   return v.map(d=>cands.find(c=>tgtMatch(c,d))).filter(Boolean);
  }
  // 放置: 任意/upToなら選ばず、強制なら先頭からn件を自動選択(ゲームが固まらない妥当な既定)
  const autoTgt=()=> (optional||upTo)? [] : cands.slice(0,Math.min(n,cands.length));
  const r=await olRunMyDecision(()=>humanPickTargetsCore(pi,cands,n,upTo,msg,optional), autoTgt);
  await olSendMove("tgt", r==null?null:r.map(serializeTgt));
  return r;
 }
 return humanPickTargetsCore(pi,cands,n,upTo,msg,optional);
}

   prompt2(msg,btns);renderBoard();
  });
 }

/* 共有モーダル #mdl の装飾(タイトル#mT・フッター.ft・決定#mOk)を既定状態へ復元。
   オンラインのホーム/ロビー/デッキ選択(showHome/olPanel/deckSelectScreen/showDeckManager)は
   独自の内蔵ボタンを使うため .ft を display:none で隠す。対戦に入る前に確実に戻さないと、
   ゲーム中の選択モーダル(modalPick/humanPay等)で「決定」ボタンが出ずハングする。 */
function resetModalChrome(){
 const mT=$("mT"); if(mT)mT.style.display="";

function modalPick(title,cands,n,upTo,optional){
 resetModalChrome();
 return new Promise(res=>{
  $("mT").textContent=title;
  const bd=$("mB");bd.innerHTML="";
  const sel=new Set();
  let done=false;
  const need=Math.min(n,cands.length);
  const finish=()=>{if(done)return;done=true;$("ovl").classList.remove("on");res([...sel].map(i=>cands[i]));};
  cands.forEach((t,i)=>{
   const el=document.createElement("div");
   const cardNo=t.no!=null?t.no:(t.u?t.u.no:null);
   if(cardNo==null){ // エリア対象などカードでない選択肢
    el.className="mc";el.style.cssText="background:#2a3040";
    el.innerHTML=`<b>${t.label}</b>`;
   }else{
    const d=CARDS[cardNo];
    el.className="mc";el.style.cssText=artBg(cardNo,d.col);el.dataset.no=cardNo;
    el.innerHTML=`<b><span class="cdot" style="background:var(--${d.col})"></span>${d.name}</b><div class="tx">${costHTML(d.play)} ${d.type==="U"?`P${d.pow}/SM${d.sm}`:""}<br>${d.text}</div>`;
   }
   el.onclick=()=>{
    if(done)return;
    if(sel.has(i)){sel.delete(i);el.classList.remove("sel");}
    else if(sel.size<n){sel.add(i);el.classList.add("sel");}
    $("mOk").disabled=upTo?sel.size<1:sel.size!==need;
    // 単数・必須の選択は選んだ時点で自動確定(盤面ユニットのクリック選択と挙動を統一)。
    // モバイルで「決定」ボタンに気付けず/届かず、エネルギー破壊選択などで進行不能になるのを防ぐ。
    if(!optional&&!upTo&&n===1&&sel.size===1)finish();
   };
   bd.appendChild(el);
  });
  // フッター(.ft)と決定(#mOk)は resetModalChrome で既に可視化済みだが、念のため再保証する。
  const _ft=($("mdl")&&$("mdl").querySelector)?$("mdl").querySelector(".ft"):null; if(_ft)_ft.style.display="";
  $("mOk").style.display="";$("mOk").textContent="決定";
  $("mOk").disabled=true;
  $("mCancel").style.display=(optional||upTo)?"":"none";
  $("mCancel").onclick=()=>{if(done)return;done=true;$("ovl").classList.remove("on");res(optional?[]:null);};
  $("mOk").onclick=()=>{if(done||$("mOk").disabled)return;finish();};
  $("mN").textContent=upTo?`${n}枚まで選択`:`${need}枚選択`;
  $("ovl").classList.add("on");
 });
}

async function llmDecideAction(pi,acts,timing){
 const p=G.pl[pi],opp=G.pl[other(pi)];
 // ヒューリスティック評価を付与し、明らかな悪手を除外して上位のみ提示
 const scored=acts.map((a,i)=>({a,i,h:a.t==="pass"?0.5:aiScore(pi,{...a},timing)}));
 scored.sort((x,y)=>y.h-x.h);
 let opts=scored.filter(o=>o.a.t==="pass"||o.h>-1).slice(0,8);
 if(!opts.some(o=>o.a.t==="pass"))opts.push(scored.find(o=>o.a.t==="pass"));
 const optTxt=opts.map(o=>{
  const a=o.a;let ex="";
  if(a.no!=null){const d=CARDS[a.no];ex=` [費${d.play}${d.type==="U"?` P${d.pow}/SM${d.sm}`:""}] ${d.text||""}`;}
  return ` id:${o.i} ${actLabel(a)}${ex} (参考評価${o.h.toFixed(1)})`;
 }).join("\n");
 const handTxt=p.hand.map(no=>{const d=CARDS[no];
  return `《${d.name}》${d.type==="U"?`ユニットP${d.pow}/SM${d.sm}`:d.type==="B"?"ベース":"戦術《"+d.timing+"》"}費${d.play}${d.text?": "+d.text:""}`;}).join("\n ");
 const user=`あなたはTCG「ディメンション・ゼロ」の熟練AIプレイヤー。
[勝利条件] 相手のスマッシュゾーンを7枚にする。自分が7枚になると敗北。
[基本戦略] ①ユニットを自軍に展開 ②中央→敵軍エリアへ移動 ③毎ターンスマッシュ(中央=SM値、敵軍=SM+1枚)。盤面にユニットがいないと一方的に殴られて負ける。相手ユニットと同じマスに入るとバトル(両者同時にパワー分ダメージ。同値なら両者破壊、攻撃側が防御側を倒せず両者生存なら攻撃側破壊、加速持ちは先制)。除去は放置すると毎ターン殴ってくるユニットに使う。
[プランゾーン] 「プランゾーン作成」=無色1で山札の1番上を公開し、そこから通常通りプレイできる(実質1ドロー)。手札が少ない時の主要なリソース源。公開したカードは相手にも見える。「更新」=公開中のカードを墓地に送り次を公開。
[盤面]\n${boardText(pi)}
[危険度] あなたは残り${7-p.smash.length}枚受けると敗北 / 相手は残り${7-opp.smash.length}枚で倒せる。相手の盤面から次ターン最大${incomingSmash(pi)}枚のスマッシュが飛んでくる。${p.smash.length+incomingSmash(pi)>=7?"◆警告: 脅威ユニットを除去/ブロックしないと敗北する◆":""}${7-opp.smash.length<=incomingSmash(other(pi))?"◆好機: 攻め切れば勝てる。詰めを優先せよ◆":""}
[自分のデッキと戦略] 《${p.deckDef.name}》 — ${p.deckDef.desc||""}
 構成: ${deckInfoTxt(p)}
 ${remainDeckTxt(p)}
 ※プラン/ドローでこの残り山札から引く。欲しい札(除去・フィニッシャー・展開)が多く残っているならプランで積極的に掘れ。手札は常に1〜2枚残す(使い切ると詰められる)。
[自分] スマッシュ${p.smash.length}/7 エネルギー: ${enTxt(p)} 墓地: ${graveTxt(p)}${p.planUp?` プラン公開中:《${CARDS[p.deck[p.deck.length-1]].name}》`:""} ${G.battles.length?"◆バトル中◆":""}
[自分の手札]\n ${handTxt||"なし"}
[相手(公開情報)] 手札${opp.hand.length}枚${(()=>{const k=knownHand(opp);return k.length?`(うち判明: ${k.map(no=>"《"+CARDS[no].name+"》").join("")})`:"";})()} スマッシュ${opp.smash.length}/7
 エネルギー: ${enTxt(opp)} / 墓地: ${graveTxt(opp)}${opp.planUp?` / プラン公開中:《${CARDS[opp.deck[opp.deck.length-1]].name}》`:""}
 ※相手のデッキ構成は非公開。エネルギー/墓地/プランの色からデッキの色とアーキタイプ(アグロ/コントロール等)を推測せよ。盤面で毎ターン殴ってくる脅威は最優先で除去/ブロックせよ。
[選択肢(参考評価は内蔵AIの推奨度)]\n${optTxt}
※受け身(盤面維持・様子見)は敗北に直結する。参考評価2.0以上の行動があるなら原則それを選び、「優先権を放棄」は本当に何もすべきでない時だけ選ぶこと。
最善のidを1つ選びJSONのみで回答: {"choice":0,"reason":"25字以内"}`;
 const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),30000);
 try{
  const r=await fetch(CFG.url.replace(/\/$/,"")+"/chat/completions",{method:"POST",headers:{"Content-Type":"application/json"},signal:ctrl.signal,
   body:JSON.stringify({model:CFG.model,temperature:0.3,max_tokens:2048,messages:[{role:"user",content:user}]})});
  clearTimeout(to);
  if(!r.ok)throw new Error("HTTP "+r.status);
  const j=await r.json();
  let txt=(j.choices&&j.choices[0].message.content)||"";
  txt=txt.replace(/<think>[\s\S]*?<\/think>/g,"");
  const m=txt.match(/\{[\s\S]*?\}/);if(!m)throw new Error("noJSON");
  const ans=JSON.parse(m[0]);
  const a=acts[+ans.choice];
  if(!a)throw new Error("badID");
  if(ans.reason)log(`${p.name}〔${ans.reason}〕`,"sys");
  // squareやtoの補完はヒューリスティックで
  if(a.t==="playU"&&!a.sq){aiScore(pi,a,timing);}
  if(a.t==="move"&&!a.to){aiScore(pi,a,timing);}
  if(a.t==="playB"&&a.col==null){aiScore(pi,a,timing);}
  return a;
 }catch(e){clearTimeout(to);log(`(LLM失敗:${e.message}→ルールベース代行)`,"sys");return null;}
}

 <b style="color:var(--gold)">バトルの流れ(ステップ)</b>: ①バトル発生(ユニットが相手ユニットのいるマスに侵入、または中央特攻など)。②<b>第1バトルステップ</b>: <b>加速</b>持ちが先制ダメージ→優先権が発生し《バトル》カードで割り込み可。③<b>第2バトルステップ</b>: 加速で撃っていないユニットが同時にダメージ→優先権。④<b>終了ステップ</b>: 致死ダメージのユニットを破壊して勝敗確定、勝利時効果・即死・送還などを処理、中央特攻ユニットはここで墓地へ。各ステップで優先権が回るので、割り込みのタイミングが読み合いになる。<br>

function _lsWriteDecks(a){try{localStorage.setItem("d0CustomDecks",JSON.stringify(a));}catch(e){}}
MYDECKS=_lsReadDecks();               // 起動時はlocalStorageの内容で初期化
function loadCustomDecks(){ return (typeof currentUser!=="undefined"&&currentUser)?(MYDECKS||[]):_lsReadDecks(); }
function saveCustomDecks(a){
 MYDECKS=a||[];
 if(typeof currentUser!=="undefined"&&currentUser&&fbDB){
  fbDB.collection("decks").doc(currentUser.uid).set({decks:MYDECKS}).catch(e=>console.error("デッキ保存失敗:",e));
 }else{ _lsWriteDecks(MYDECKS); }
}
// ログイン/ログアウト時にデッキキャッシュを同期。ログイン初回でFirestoreに無ければlocalStorageから移行。
async function syncDecksForUser(user){
 if(!user||!fbDB){ MYDECKS=_lsReadDecks(); if(typeof onDecksLoaded==="function")onDecksLoaded(); return; }
 try{
  const ref=fbDB.collection("decks").doc(user.uid);
  const snap=await ref.get();
  if(snap.exists){ MYDECKS=(snap.data()&&snap.data().decks)||[]; }
  else { const ls=_lsReadDecks(); MYDECKS=ls; if(ls&&ls.length){ await ref.set({decks:ls}); } } // 初回移行
 }catch(e){ console.error("デッキ読込失敗:",e); MYDECKS=_lsReadDecks(); }
 if(typeof onDecksLoaded==="function")onDecksLoaded();
}
// デッキ共有: リストをコード文字列に相互変換
function deckToCode(dk){
 const l=dk.list.map(e=>typeof e==="number"?[e,2]:[e.no,e.n]);
 try{return "D0-"+btoa(unescape(encodeURIComponent(JSON.stringify({n:dk.name,l}))));}catch(e){return "";}
}
function codeToDeck(code){
 try{
  const j=JSON.parse(decodeURIComponent(escape(atob((code||"").trim().replace(/^D0-/,"")))));
  if(!j.l||!Array.isArray(j.l))return null;
  const list=j.l.filter(([no])=>CARDS[no]).map(([no,n])=>({no:+no,n:Math.max(1,Math.min(3,+n||1))}));
  if(!list.length)return null;
  return {name:(j.n||"読込デッキ").toString().slice(0,40),colors:[...new Set(list.map(e=>CARDS[e.no].col))].join(""),desc:"読み込んだデッキ",list};
 }catch(e){return null;}
}
function shareDeck(dk){
 const code=deckToCode(dk);
 if(navigator.clipboard&&navigator.clipboard.writeText){try{navigator.clipboard.writeText(code);}catch(e){}}
 // クリップボードが効かない環境でも必ずコードが見えるよう、選択済みテキストで表示
 prompt("↓デッキコード（Ctrl/⌘+Cでコピー。相手は「コードから読込」で取り込めます）",code);
}
function importDeckByCode(){
 const code=prompt("デッキコードを貼り付けてください（D0-… で始まる文字列）:");
 if(!code)return null;
 const dk=codeToDeck(code);
 if(!dk){alert("無効なデッキコードです。");return null;}
 const cs=loadCustomDecks().filter(x=>x.name!==dk.name);
 cs.push(dk);saveCustomDecks(cs);
 const tot=dk.list.reduce((s,e)=>s+e.n,0);
 alert(`「${dk.name}」(${tot}枚)を読み込みました。${tot!==40?"※40枚ではないので、編集で調整してください。":""}`);
 return dk;
}

/* スマホ: ターン/フェイズ帯とスタックを中央ペイン(操作枠の直前)へ寄せ、操作を下に集約。PCは左ペインに戻す。 */
function layoutPanes(){
 if(typeof window==="undefined"||!window.matchMedia)return;
 const mobile=window.matchMedia("(max-width:820px)").matches;
 const paneL=$("paneL"),paneC=$("paneC"),prompt=$("prompt"),ts=$("turnStrip"),sw=$("stackWrap");
 if(mobile){
  if(paneC&&prompt){ if(ts&&ts.parentNode!==paneC)paneC.insertBefore(ts,prompt); if(sw&&sw.parentNode!==paneC)paneC.insertBefore(sw,prompt); }
 }else if(paneL){
  if(ts&&ts.parentNode!==paneL)paneL.appendChild(ts);
  if(sw&&sw.parentNode!==paneL)paneL.appendChild(sw);
 }
}
if(typeof window!=="undefined")window.addEventListener("resize",layoutPanes);

function toggleLog(force){
 const pr=$("paneR"); if(!pr) return;
 const willOpen = (force!==undefined) ? force : !pr.classList.contains("open");
 pr.classList.toggle("open", willOpen);
 const bd=$("logBackdrop"); if(bd) bd.classList.toggle("on", willOpen);
}

/* ============ オンライン ロビー/マッチング (Phase3 M3, 共有シード方式) ============

    queue/{auto}  : {uid,nickname,deck:{name,list},createdAt, matchId?}  公開マッチ待機列
    rooms/{CODE}  : {hostUid,hostNickname,hostDeck:{name,list},createdAt,status:"waiting"|"matched",matchId?,guestUid?}  合言葉ルーム
    matches/{id}  : {uids:[a,b],players:{<uid>:{nickname,deck:{name,list}}},seed(32bit),firstUid,status:"ready",createdAt}

/* --- 公開マッチ(queue + トランザクション) --- */
async function olFindPublic(){
 olRenderWaiting("対戦相手を探しています…", olCancelPublic);
 const meUid=currentUser.uid;
 try{
  const qs=await fbDB.collection("queue").limit(10).get();
  let matchId=null;
  for(const doc of qs.docs){
   const d=doc.data()||{};
   if(d.uid===meUid || d.matchId) continue;
   try{
    matchId=await fbDB.runTransaction(async tx=>{
     const s=await tx.get(doc.ref);
     if(!s.exists) return null;
     const dd=s.data()||{};
     if(dd.matchId || dd.uid===meUid) return null;   // 既に他とマッチ済/自分 → スキップ
     const mid=fbDB.collection("matches").doc().id;
     const seed=Math.floor(Math.random()*0xffffffff);
     const uids=[dd.uid, meUid];
     const firstUid=uids[Math.floor(Math.random()*uids.length)];
     const players={};
     players[dd.uid]={nickname:dd.nickname||"相手", deck:dd.deck||null};
     players[meUid]={nickname:olNick(), deck:{name:OL.deck.name,list:OL.deck.list}};
     tx.set(fbDB.collection("matches").doc(mid), {uids, players, seed, firstUid, status:"ready", createdAt:olTS()});
     tx.update(doc.ref, {matchId:mid});   // 相手待機ドキュメントに成立通知
     return mid;
    });
   }catch(e){ console.error("マッチトランザクション失敗:",e); matchId=null; }
   if(matchId) break;
  }
  if(matchId){ olGoMatch(matchId); return; }
  // 相手なし → 自分を待機列に登録し、拾われる(matchId付与)のを待つ
  const ref=fbDB.collection("queue").doc();
  OL.queueRef=ref;
  await ref.set({uid:meUid, nickname:olNick(), deck:{name:OL.deck.name,list:OL.deck.list}, createdAt:olTS()});
  OL.unsub=ref.onSnapshot(snap=>{
   if(!snap.exists) return;
   const d=snap.data()||{};
   if(d.matchId){
    const mid=d.matchId;
    olCleanupListeners();
    ref.delete().catch(e=>console.error("queue自己削除失敗:",e));
    OL.queueRef=null;
    olGoMatch(mid);
   }
  }, err=>console.error("queue購読エラー:",err));
 }catch(e){
  console.error("公開マッチ失敗:",e);
  alert("マッチングに失敗しました: "+((e&&e.message)||e));
  olRenderMenu();
 }
}

}

/* 合言葉/招待の共通参加コア: rooms/{code} をトランザクションで waiting→matched にし matches を生成。
   成立で matchId を返し、失敗(ルーム無し/対戦中/自室)は throw。合言葉参加・招待受諾の両方から流用。 */
async function olJoinRoomCore(code){
 const meUid=currentUser.uid;
 const ref=fbDB.collection("rooms").doc(code);
 return await fbDB.runTransaction(async tx=>{
  const s=await tx.get(ref);
  if(!s.exists) throw new Error("その合言葉のルームは見つかりません。");
  const d=s.data()||{};
  if(d.status!=="waiting") throw new Error("そのルームは既に対戦中または終了しています。");
  if(d.hostUid===meUid) throw new Error("自分が作成したルームには参加できません。");
  const m=fbDB.collection("matches").doc().id;
  const seed=Math.floor(Math.random()*0xffffffff);
  const uids=[d.hostUid, meUid];
  const firstUid=uids[Math.floor(Math.random()*uids.length)];
  const players={};
  players[d.hostUid]={nickname:d.hostNickname||"相手", deck:d.hostDeck||null};
  players[meUid]={nickname:olNick(), deck:{name:OL.deck.name,list:OL.deck.list}};
  tx.set(fbDB.collection("matches").doc(m), {uids, players, seed, firstUid, status:"ready", createdAt:olTS()});
  tx.update(ref, {status:"matched", matchId:m, guestUid:meUid});
  return m;
 });
}

/* --- M4: 対戦開始・同期ドライバ --- */
function olEndCleanup(){
 try{ if(ONLINE.movesUnsub)ONLINE.movesUnsub(); }catch(e){}
 try{ if(ONLINE.matchUnsub)ONLINE.matchUnsub(); }catch(e){}
 ONLINE.movesUnsub=null; ONLINE.matchUnsub=null;

function olWriteFinish(winnerUid,reason){
 if(ONLINE._finishWritten)return;
 ONLINE._finishWritten=true;
 try{ ONLINE.matchRef.set({status:"finished", winnerUid:winnerUid||null, reason:reason||"normal", endedAt:olTS()},{merge:true}); }
 catch(e){ console.error("finish書込失敗",e); }
}
// match購読で終局/投了/切断・プレゼンスを検知(相手側の終了を反映)
function olOnMatchSnap(d){
 if(!d||!ONLINE.active)return;
 // プレゼンス(相手のlastSeen)。更新を検知したら「最後に見た時刻」をローカル基準で刻む(時計ずれ回避)
 try{
  const pr=d.presence&&d.presence[ONLINE.oppUid];
  if(pr){ const ms=pr.toMillis?pr.toMillis():(pr.seconds?pr.seconds*1000:0);
   if(ms && ms!==ONLINE._oppPresMs){ ONLINE._oppPresMs=ms; ONLINE.oppSeenAt=Date.now(); if(ONLINE._dcActive)olHideDcHud(); } }
 }catch(e){}
 if(d.status==="finished" && !ONLINE.ended){
  ONLINE.ended=true; ONLINE._finishWritten=true;
  G.over=true;
  G.winner = d.winnerUid==null ? null : (d.winnerUid===ONLINE.myUid?ONLINE.myIndex:other(ONLINE.myIndex));
  const rsn=d.reason==="disconnect"?"（相手の切断）":d.reason==="timeout"?"（時間切れ）":"（相手の投了または終局）";

/* 自分の1決定をタイマー付きで実行。放置(90秒)なら autoFn() の安全な既定で自動解決。
   手動で確定したら連続タイムアウトをリセット。タイムアウトなら連続数を加算し3回で時間切れ負け。 */
function olRunMyDecision(coreFn, autoFn){
 return new Promise(resolve=>{
  let done=false;
  const settle=(v)=>{ if(done)return; done=true; olClearTurnTimer(); resolve(v); };
  olStartTurnTimer((endedFlag)=>{
   if(done)return;
   let v; try{ v=autoFn(); }catch(e){ console.error("auto決定失敗",e); v=undefined; }
   olClearPromptUI();
   if(!endedFlag && !ONLINE.ended){ // 純粋な90秒超過のみタイムアウトとして計上
    log("⏱ 手番タイマー(90秒)超過: 自動で処理しました","imp");
    olRegisterTimeout(); // 連続タイムアウト加算(3回で時間切れ負け)
   }
   settle(v);
  });
  Promise.resolve().then(coreFn).then(v=>{ ONLINE.consecTimeouts=0; settle(v); },
   err=>{ console.error("決定処理エラー",err); settle(undefined); });
 });
}

/* ============================================================

   - 対象は ONLINE対戦の2人のみ(vs-AI/ホーム/ロビー/デッキ管理では無効)。
   - moves(指し手同期)/presence/heartbeat とは完全に別チャネル:
       matches/{matchId}/rtc/offer              … caller の offer(SDP)
       matches/{matchId}/rtc/answer             … callee の answer(SDP)
       matches/{matchId}/rtc/offer/callerCandidates/{auto}  … caller の ICE候補
       matches/{matchId}/rtc/answer/calleeCandidates/{auto} … callee の ICE候補
     決定論同期・棋譜(moves)・presence を一切汚さない(参照/購読/書込を分離)。
   - 役割は uid の文字列比較で決定論的に一意化: 小さい方=caller(offerを作る)、大きい方=callee(answerを返す)。
     これで両クライアントが矛盾なく片方だけ offer を作る。
   - ICEサーバは Google公開STUNのみ。TURNは未導入(厳しいNAT/対称NATでは繋がらない場合あり)。

   - 音声機能の失敗(権限拒否/未対応/接続不可)は対戦本体(指し手同期・進行)に一切影響させない(全て try/catch で隔離)。

  {urls:"stun:stun.l.google.com:19302"},
  {urls:"stun:stun1.l.google.com:19302"},
  {urls:"stun:stun2.l.google.com:19302"}

/* ===== Cloudflare Realtime TURN 設定 =====================================
   ★ここに、デプロイした Cloudflare Worker の URL を入れると TURN 中継が有効になる。
     例: const TURN_ENDPOINT = "https://d0-turn.<あなた>.workers.dev";
   ・空文字("")のままなら従来通り Google STUN のみで動作(後方互換)。
   ・Worker は Cloudflare の generate-ice-servers API を叩き、短命の
     iceServers(urls/username/credential) だけをクライアントへ返す(APIトークンは秘匿)。
   ・スマホ↔PC が同一Wi-Fiでも繋がらない(ヘアピンNAT非対応)環境では TURN 中継が必須。
   Workerコードは同フォルダの turn-worker.js を参照。 */
const TURN_ENDPOINT = "https://d0-turn.sounosuke.workers.dev/";

function rtcRenderDiag(){

/* --- ICEサーバ解決: TURN_ENDPOINT があれば Worker から短命認証情報を取得し
       既存の Google STUN とマージ。失敗時は STUN のみにフォールバック(通話は止めない)。 */
async function rtcResolveIce(){
  const cfg={ iceServers: RTC_ICE.iceServers.slice() };  // 既定は STUN のみ
  RTC.usingTurn=false;
  if(!TURN_ENDPOINT){ rtcSetDiag("turn","未設定(STUNのみ)"); return cfg; }
  try{
    rtcSetDiag("turn","TURN取得中…");
    const res=await fetch(TURN_ENDPOINT, {method:"GET", cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const j=await res.json();
    // Worker の返却形に幅を持たせて吸収: 配列 / {iceServers:[...]} / {iceServers:{...}}
    let arr=null;
    if(Array.isArray(j)) arr=j;
    else if(j && Array.isArray(j.iceServers)) arr=j.iceServers;
    else if(j && j.iceServers && typeof j.iceServers==="object") arr=[j.iceServers];
    if(!arr||!arr.length) throw new Error("iceServers が空/不正");
    // RTCConfiguration.iceServers 形式(配列)へ整形して STUN とマージ
    cfg.iceServers = RTC_ICE.iceServers.concat(arr);
    RTC.usingTurn = arr.some(s=>{ const u=s&&s.urls; const list=Array.isArray(u)?u:[u]; return list.some(x=>typeof x==="string"&&/^turns?:/i.test(x)); });
    rtcSetDiag("turn", RTC.usingTurn?"取得OK(TURN含む)":"取得(TURN無し)");
  }catch(e){
    console.error("TURN認証情報の取得に失敗(STUNのみで継続)",e);
    RTC.usingTurn=false;
    rtcSetDiag("turn","取得失敗→STUNのみ");
    rtcSetDiag("err","TURN取得失敗: "+(e&&e.message||e));
  }
  return cfg;
}
/* --- selected candidate pair の種別を取得して経路(relay/srflx/host)を診断表示 --- */
async function rtcPollStats(){
  const pc=RTC.pc; if(!pc||!pc.getStats)return;
  try{
    const stats=await pc.getStats();
    let sel=null; const cands={};
    stats.forEach(r=>{
      if(r.type==="local-candidate"||r.type==="remote-candidate") cands[r.id]=r;
      if(r.type==="candidate-pair" && r.selected) sel=r;
    });
    if(!sel){ stats.forEach(r=>{ if(r.type==="candidate-pair" && r.state==="succeeded" && r.nominated!==false && !sel) sel=r; }); }
    if(sel){
      const lc=cands[sel.localCandidateId], rc=cands[sel.remoteCandidateId];
      const lt=lc&&(lc.candidateType||lc.type), rt=rc&&(rc.candidateType||rc.type);
      const relay=(lt==="relay"||rt==="relay");
      const via = relay?"TURN中継(relay)" : (lt==="srflx"||rt==="srflx")?"直通(srflx)" : (lt==="host"||rt==="host")?"直通(host)" : (lt||rt||"");
      if(via){ rtcSetDiag("pair", via + (lt&&rt?` [${lt}/${rt}]`:"")); }
      const st=pc.connectionState||pc.iceConnectionState||"";
      if(st==="connected"||st==="completed") rtcSetStat(relay?"通話中(TURN)":"通話中(直通)");
    }
  }catch(e){}
}
function rtcFail(msg){
  const btn=$("rtcCallBtn"); if(btn)btn.textContent="🎤 通話";
  const mb=$("rtcMuteBtn"); if(mb)mb.style.display="none";
  rtcSetStat(msg||"利用不可");

/* ボタン押下で開始/終了(ユーザー操作起点でマイク許可を取る) */
function rtcToggleCall(){ if(RTC.active){ rtcCleanup(false); } else { rtcStartCall(); } }
async function rtcStartCall(){
  if(RTC.active)return;
  if(!ONLINE.active||ONLINE.ended){ rtcSetStat("対戦外"); return; }
  if(!rtcSupported()){ rtcFail("非対応"); return; }
  if(!ONLINE.matchRef||!ONLINE.myUid||!ONLINE.oppUid){ rtcFail("利用不可"); return; }
  const btn=$("rtcCallBtn");
  try{
    RTC.active=true; RTC.remoteSet=false; RTC.muted=false; RTC.diag={}; rtcRenderDiag();
    if(btn)btn.textContent="⛔ 通話終了";
    rtcSetStat("マイク許可…"); rtcSetDiag("mic","許可待ち…");
    // 1) マイク取得(HTTPS必須。GitHub Pages/mybrain.tv は https のため可)。ユーザー操作起点。
    RTC.localStream=await navigator.mediaDevices.getUserMedia({audio:true, video:false});
    rtcSetDiag("mic","OK");
    // 2) 役割を uid 文字列比較で決定論的に一意化(小さい方=caller)
    RTC.role=(ONLINE.myUid < ONLINE.oppUid)?"caller":"callee";
    rtcSetDiag("role", RTC.role==="caller"?"caller(発信)":"callee(応答)");
    // 通話ごとに一意なセッションIDを付与(古いoffer/answerによる誤接続を無効化する)。callerが基準。
    RTC.session=(ONLINE.myUid<ONLINE.oppUid?ONLINE.myUid:ONLINE.oppUid)+"_"+Date.now()+"_"+Math.random().toString(36).slice(2,8);
    // 3) シグナリングパス(moves 等とは別チャネル)
    RTC.rtcCol=ONLINE.matchRef.collection("rtc");
    RTC.offerRef=RTC.rtcCol.doc("offer");
    RTC.answerRef=RTC.rtcCol.doc("answer");
    RTC.callerCandCol=RTC.offerRef.collection("callerCandidates");
    RTC.calleeCandCol=RTC.answerRef.collection("calleeCandidates");
    // 4) ICEサーバを解決(TURN_ENDPOINT があれば Worker から取得して STUN とマージ。失敗時 STUN のみ)
    const iceCfg=await rtcResolveIce();
    // iceTransportPolicy は 'all'(既定)。TURN必須かの診断で relay 強制テストをしたい場合のみ次を有効化:
    // iceCfg.iceTransportPolicy='relay';
    // 5) PeerConnection(通話開始のたびに新規生成)
    const pc=new RTCPeerConnection(iceCfg);
    RTC.pc=pc; RTC.remoteStream=new MediaStream();
    RTC.localStream.getTracks().forEach(t=>pc.addTrack(t, RTC.localStream));
    // 相手音声を受信 → 非表示<audio>で再生(自分の声は再生しない)
    pc.ontrack=(ev)=>{ try{ (ev.streams&&ev.streams[0]?ev.streams[0].getTracks():[ev.track]).forEach(tr=>{ try{RTC.remoteStream.addTrack(tr);}catch(_){} }); const a=$("rtcAudio"); if(a){ a.srcObject=RTC.remoteStream; if(a.play)a.play().catch(()=>{}); } }catch(e){ console.error("ontrack",e); } };
    pc.onconnectionstatechange=rtcReflectState;
    pc.oniceconnectionstatechange=rtcReflectState;
    rtcReflectState();
    if(RTC.role==="caller") await rtcRunCaller(); else await rtcRunCallee();
    // ミュートトグルを表示(接続確立を待たずに使える)
    const mb=$("rtcMuteBtn"); if(mb){ mb.style.display=""; rtcUpdMuteBtn(); }
  }catch(e){
    console.error("通話開始失敗",e);
    const em=(e&&(e.name==="NotAllowedError"||e.name==="SecurityError"))?"マイク不許可":(e&&e.name==="NotFoundError")?"マイク無し":"利用不可";
    if(em==="マイク不許可"||em==="マイク無し") rtcSetDiag("mic",em);
    rtcCleanup(false);   // ※cleanupはRTC.diagを消さない(失敗理由を診断パネルに残す)
    rtcSetDiag("err",(e&&(e.name||e.message))?((e.name||"")+" "+(e.message||"")).trim():String(e));
    rtcFail(em);
  }
}
/* caller: offerを作り、answer/相手ICEを購読 */
async function rtcRunCaller(){
  const pc=RTC.pc;
  // 自分の役割側の古いシグナリングをクリア(古いofferでの誤接続を防ぐ)
  await rtcDeleteDoc(RTC.offerRef); await rtcClearCol(RTC.callerCandCol);
  pc.onicecandidate=(ev)=>{ if(ev.candidate){ try{ RTC.callerCandCol.add({cand:ev.candidate.toJSON(), session:RTC.session}); }catch(e){} } };
  const offer=await pc.createOffer({offerToReceiveAudio:true});
  await pc.setLocalDescription(offer);
  await RTC.offerRef.set({type:offer.type, sdp:offer.sdp, session:RTC.session, from:ONLINE.myUid, ts:olTS()});
  rtcSetStat("相手待ち"); rtcSetDiag("signal","offer送信→answer待ち");
  // answer(callee)を待つ → setRemoteDescription(セッション一致・未設定時のみ)
  RTC.unsubs.push(RTC.answerRef.onSnapshot(async snap=>{
    try{ const data=snap.exists?snap.data():null;
      if(!data||!data.sdp||data.session!==RTC.session)return;
      if(pc.currentRemoteDescription)return;
      await pc.setRemoteDescription(new RTCSessionDescription({type:data.type, sdp:data.sdp}));
      rtcSetDiag("signal","answer受信");
    }catch(e){ console.error("answer適用失敗",e); rtcSetDiag("err","answer適用失敗: "+(e&&e.message||e)); }
  }, err=>console.error("answer購読エラー",err)));
  // callee の ICE候補を購読 → addIceCandidate
  RTC.unsubs.push(RTC.calleeCandCol.onSnapshot(snap=>{
    snap.docChanges().forEach(async ch=>{ if(ch.type!=="added")return; const c=ch.doc.data(); if(!c||!c.cand)return;
      if(c.session&&RTC.session&&c.session!==RTC.session)return;
      try{ await pc.addIceCandidate(new RTCIceCandidate(c.cand)); }catch(e){} });
  }, err=>console.error("calleeCand購読エラー",err)));
}
/* callee: offerを待ち answerを返す。自分ICEを書き、相手ICEを購読 */
async function rtcRunCallee(){
  const pc=RTC.pc;
  await rtcDeleteDoc(RTC.answerRef); await rtcClearCol(RTC.calleeCandCol);
  pc.onicecandidate=(ev)=>{ if(ev.candidate){ try{ RTC.calleeCandCol.add({cand:ev.candidate.toJSON(), session:RTC.session}); }catch(e){} } };
  rtcSetStat("相手待ち");
  RTC.unsubs.push(RTC.offerRef.onSnapshot(async snap=>{
    try{ const data=snap.exists?snap.data():null;
      if(!data||!data.sdp)return;
      if(RTC.remoteSet)return;                 // 既にoffer適用済みなら無視(重複防止)
      RTC.remoteSet=true; RTC.session=data.session||RTC.session;   // caller のセッションに合わせる
      await pc.setRemoteDescription(new RTCSessionDescription({type:data.type, sdp:data.sdp}));
      const answer=await pc.createAnswer();
      await pc.setLocalDescription(answer);
      await RTC.answerRef.set({type:answer.type, sdp:answer.sdp, session:RTC.session, from:ONLINE.myUid, ts:olTS()});
      rtcSetStat("接続中…"); rtcSetDiag("signal","offer受信→answer送信");
    }catch(e){ console.error("offer処理失敗",e); RTC.remoteSet=false; rtcSetDiag("err","offer処理失敗: "+(e&&e.message||e)); }
  }, err=>console.error("offer購読エラー",err)));
  RTC.unsubs.push(RTC.callerCandCol.onSnapshot(snap=>{
    snap.docChanges().forEach(async ch=>{ if(ch.type!=="added")return; const c=ch.doc.data(); if(!c||!c.cand)return;
      if(c.session&&RTC.session&&c.session!==RTC.session)return;
      try{ await pc.addIceCandidate(new RTCIceCandidate(c.cand)); }catch(e){} });
  }, err=>console.error("callerCand購読エラー",err)));
}
function rtcReflectState(){
  const pc=RTC.pc; if(!pc)return;
  try{ rtcSetDiag("ice", pc.iceConnectionState||""); rtcSetDiag("conn", pc.connectionState||""); }catch(e){}
  const cs=pc.connectionState||pc.iceConnectionState||"";
  let t;
  if(cs==="connected"||cs==="completed"){ t="通話中"; try{ rtcPollStats(); }catch(e){} }
  else if(cs==="failed"){ t="接続失敗"; rtcSetDiag("err", RTC.usingTurn?"ICE failed(TURN経由でも接続不可)":"ICE failed(TURN未使用。TURN_ENDPOINT設定を検討)"); }
  else if(cs==="disconnected") t="切断";
  else if(cs==="connecting"||cs==="checking") t="接続中…";
  else t=RTC.remoteSet?"接続中…":"相手待ち";
  rtcSetStat(t);
}

async function rtcDeleteDoc(ref){ try{ if(ref)await ref.delete(); }catch(e){} }
async function rtcClearCol(col){ try{ if(!col)return; const s=await col.get(); const b=[]; s.forEach(d=>b.push(d.ref.delete())); await Promise.all(b); }catch(e){} }
/* 通話のクリーンアップ: 購読解除・自分のシグナリング削除・マイク停止・PC close。full=trueでUIも撤去。
   対戦終了(終局/投了/退出/切断/時間切れ)・ページ離脱で呼ぶ。冪等。 */
function rtcCleanup(full){
  try{
    (RTC.unsubs||[]).forEach(u=>{ try{u();}catch(e){} }); RTC.unsubs=[];
    // 自分が書いたシグナリングドキュメントのみ削除(ベストエフォート)
    try{ if(RTC.role==="caller"){ rtcDeleteDoc(RTC.offerRef); rtcClearCol(RTC.callerCandCol); }
         else if(RTC.role==="callee"){ rtcDeleteDoc(RTC.answerRef); rtcClearCol(RTC.calleeCandCol); } }catch(e){}
    try{ if(RTC.localStream) RTC.localStream.getTracks().forEach(t=>{ try{t.stop();}catch(_){} }); }catch(e){}
    try{ if(RTC.pc){ RTC.pc.ontrack=null; RTC.pc.onicecandidate=null; RTC.pc.onconnectionstatechange=null; RTC.pc.oniceconnectionstatechange=null; RTC.pc.close(); } }catch(e){}
    const a=$("rtcAudio"); if(a){ try{a.srcObject=null;}catch(e){} }
  }catch(e){ console.error("rtc cleanup",e); }
  RTC.active=false; RTC.pc=null; RTC.localStream=null; RTC.remoteStream=null;
  RTC.role=null; RTC.session=null; RTC.muted=false; RTC.remoteSet=false; RTC.usingTurn=false;
  // ※RTC.diag は意図的に消さない(失敗理由が診断パネルに残るように)。次回 rtcStartCall で初期化。
  RTC.rtcCol=RTC.offerRef=RTC.answerRef=RTC.callerCandCol=RTC.calleeCandCol=null;
  if(full){ rtcRemoveUI(); }
  else{ // バーは残し、再度「通話」を押せる状態に戻す
    const btn=$("rtcCallBtn"); if(btn)btn.textContent="🎤 通話";
    const mb=$("rtcMuteBtn"); if(mb)mb.style.display="none";
    rtcSetStat("未接続");
  }
}

/* ============================================================
   フレンド対戦招待 (P3.18) …既存プライベートルーム(rooms/{code})を内部流用。
   データモデル:
    users/{招待相手uid}/invites/{自分uid} = {fromUid, fromNick, roomCode, ts(ms)}
   招待する側: デッキ選択 → プライベートルーム作成(コードは内部利用) → invites に set →
              既存の「相手待ち」onSnapshot(room matched)で対戦成立 → olGoMatch。
   招待される側: ログイン中ずっと users/{myUid}/invites を onSnapshot 購読。対戦中以外なら
              ポップアップ(受ける/断る)。受ける=デッキ選択→olJoinRoomCore(roomCode)で参加。 */
let INV={friendUid:null, friendNick:null, roomCode:null};
const INVITE_TTL_MS=6*60*60*1000; // 6時間より古い招待は自動で無視/掃除

/* --- 招待する側 --- */
function olInviteFriend(friendUid, friendNick){

 try{

 }
 // 既存の「相手待ち」と同じ待機画面
 const bd=olPanel(`<div style="width:100%;text-align:center;padding:20px 8px">
    <div style="font-size:20px;color:var(--gold);font-weight:bold;margin-bottom:12px">⚔️ 対戦に招待しました</div>

 OL.unsub=ref.onSnapshot(snap=>{

/* --- 招待される側: invites 購読 + ポップアップ --- */
let INVBOX={unsub:null, pending:[], popup:null, currentId:null};
function startInviteInbox(){
 stopInviteInbox();
 if(!fbDB||!currentUser)return;
 INVBOX.unsub=fbDB.collection("users").doc(currentUser.uid).collection("invites")
   .onSnapshot(snap=>olHandleInvites(snap), err=>console.error("招待購読失敗",err));

function stopInviteInbox(){
 if(INVBOX.unsub){ try{INVBOX.unsub();}catch(e){} INVBOX.unsub=null; }
 INVBOX.pending=[]; olHideInvitePopup();

function olHandleInvites(snap){
 const now=Date.now(), me=currentUser&&currentUser.uid;
 const pending=[];
 snap.forEach(doc=>{
  const d=doc.data()||{}; const fromUid=d.fromUid||doc.id; const ts=Number(d.ts)||0;
  if(ts && (now-ts)>INVITE_TTL_MS){ // 古い招待は自動掃除
   if(me)fbDB.collection("users").doc(me).collection("invites").doc(doc.id).delete().catch(()=>{});
   return;
  }
  pending.push({id:doc.id, fromUid, fromNick:d.fromNick||"フレンド", roomCode:d.roomCode||null, ts});
 });
 pending.sort((a,b)=>b.ts-a.ts);
 INVBOX.pending=pending;
 // 表示中の招待が取り消された(招待者がキャンセル)ら閉じる
 if(INVBOX.popup && INVBOX.currentId && !pending.some(p=>p.id===INVBOX.currentId)) olHideInvitePopup();
 olMaybeShowInvite();
}
