/* ===== 成績履歴からの棋譜再生(読み取り専用): matches/{id} の seed/デッキ/firstUid と moves(seq順)を読み、
   復帰再生と同じ「オンライン決定をinboxから供給して局面を再構築」する要領で最初から再生する。
   olResumeMatch(ライブ復帰)と違い、Firestoreへ一切書き込まず(_finishWritten/_statsRecordedで抑止)、
   購読もせず、記録済みの手を再実行し終えたら既存のリプレイUI(前後/スライダー)に載せる。 ===== */
async function olReplayFinishedMatch(matchId){
 if(olMatchInProgress()){ alert("対戦中は棋譜を再生できません。終局後にご利用ください。"); return; }
 if(!fbDB||!currentUser){ alert("ログインが必要です"); return; }
 if(!matchId){ alert("再生対象の対戦IDがありません(古い履歴の可能性があります)。"); return; }
 let d, inbox={}, cnt=0;
 try{
  const mref=fbDB.collection("matches").doc(matchId);
  const snap=await mref.get();
  if(!snap.exists){ alert("対戦データが見つかりませんでした(削除済みの可能性があります)。"); return; }
  d=snap.data()||{};
  const mvSnap=await mref.collection("moves").orderBy("seq").get();
  mvSnap.forEach(doc=>{ const r=doc.data(); if(r&&r.seq!=null){ inbox[r.seq]=r; cnt=Math.max(cnt,r.seq+1); } });
 }catch(e){ console.error("再生データ取得失敗",e); alert("対戦データの取得に失敗しました: "+(e&&e.message||e)); return; }
 const fu=d.firstUid, ou=(d.uids||[]).find(u=>u!==fu);
 if(!fu||!ou||!d.players||!d.players[fu]||!d.players[ou]){ alert("対戦データが不完全で再生できません。"); return; }
 const deck0=d.players[fu].deck, deck1=d.players[ou].deck;
 if(!deck0||!deck1||!deck0.list||!deck1.list){ alert("デッキ情報が取得できず再生できません。"); return; }
 if(!cnt){ alert("この対戦には再生できる指し手が記録されていません。"); return; }
 // ONLINE を「読み取り専用リプレイ」状態に。全決定を inbox から供給し、書込・購読・タイマーは行わない。
 const meUid=currentUser.uid;
 ONLINE.active=true; ONLINE.ended=false; ONLINE._replayView=true;
 ONLINE._finishWritten=true; ONLINE._statsRecorded=true; // endGame等での書込を無効化(読み取り専用)
 ONLINE._inMyAction=false;
 ONLINE.myUid=meUid; ONLINE.myIndex=(meUid===fu)?0:((meUid===ou)?1:0); ONLINE.oppUid=(meUid===fu)?ou:fu;
 ONLINE.matchId=null; ONLINE.matchRef=null; ONLINE.movesRef=null; ONLINE.movesUnsub=null; ONLINE.matchUnsub=null;
 ONLINE.seq=0; ONLINE.inbox=inbox; ONLINE.waiters={};
 ONLINE.replayUntil=Number.MAX_SAFE_INTEGER; // 全決定を catch-up 扱い→olRecvMoveで供給・送信なし(尽きたら_replayViewガードで終局)
 const ovl=$("ovl"); if(ovl)ovl.classList.remove("on"); HOME_OPEN=false;
 const names=[ (d.players[fu].nickname||"先攻"), (d.players[ou].nickname||"後攻") ];
 try{
  newGame(deck0, deck1, {seed:d.seed, first:0, online:true, names});
  G._reconstruct=true; // renderAllはスナップショット記録のみ(DOM描画なし・高速)
  G.openingHands=[G.pl[0].hand.slice(),G.pl[1].hand.slice()];
  await runGame(); // 記録済みの手を最後まで再実行して各局面を再構築
 }catch(e){ console.error("再生の再構築に失敗",e); }
 G._reconstruct=false;
 // 終局結果(勝者)を対戦ドキュメントの記録で上書き(切断/時間切れ/投了は指し手だけでは勝者が定まらないため)
 if(d.winnerUid!==undefined){
  const w=d.winnerUid==null?null:(d.winnerUid===fu?0:1);
  G.winner=w; if(G.history&&G.history.length){G.history[G.history.length-1].winner=w;G.history[G.history.length-1].over=true;}
 }
 // ONLINE 状態を後片付け(以後の通常UI/POV表示に影響しないように)
 ONLINE.active=false; ONLINE.ended=true; ONLINE._replayView=false;
 ONLINE.inbox={}; ONLINE.waiters={}; ONLINE.replayUntil=0;
 KREC={mode:"off",stream:[],i:0};
 if(!(G.history&&G.history.length)){ alert("この対戦の再生用データを再構築できませんでした(記録が不完全な可能性があります)。"); return; }
 REPLAY={frames:G.history,logs:G.logs.slice(),idx:0,liveG:null,imported:true};
 openReplayBar(); replayRender();
}
/* ===== 再接続: 未終局の自分の対戦を検出して復帰再生する ===== */
async function olFindResumable(){
 if(!fbDB||!currentUser)return null;
 try{
  const snap=await fbDB.collection("matches").where("uids","array-contains",currentUser.uid).limit(20).get();
  let best=null, bestT=0;
  snap.forEach(doc=>{ const d=doc.data()||{};
   if(d.status==="finished")return;
   if(!(d.status==="ready"||d.status==="playing"))return;
   const t=(d.createdAt&&d.createdAt.toMillis)?d.createdAt.toMillis():0;
   if(t>=bestT){ bestT=t; best={id:doc.id, d}; }
  });
  return best;
 }catch(e){ console.error("復帰対象の検索失敗",e); return null; }
}
async function olResumeMatch(matchId){
 if(ONLINE.active){ return; }
 if(!fbDB||!currentUser){ showHome(); return; }
 const meUid=currentUser.uid;
 try{
  const mref=fbDB.collection("matches").doc(matchId);
  const snap=await mref.get();
  if(!snap.exists){ alert("対戦が見つかりませんでした。"); showHome(); return; }
  const d=snap.data();
  if(d.status==="finished"){ alert("この対戦は既に終了しています。"); showHome(); return; }
  const fu=d.firstUid, ou=(d.uids||[]).find(u=>u!==fu);
  if(!fu||!ou||!d.players||!d.players[fu]||!d.players[ou]){ alert("対戦データが不完全です。"); showHome(); return; }
  const deck0=d.players[fu].deck, deck1=d.players[ou].deck;
  if(!deck0||!deck1||!deck0.list||!deck1.list){ alert("デッキ情報が取得できませんでした。"); showHome(); return; }
  // 既存の指し手(seq順で全件)を先読みして inbox へ(復帰再生で即時供給)
  const mvSnap=await mref.collection("moves").orderBy("seq").get();
  const inbox={}; let cnt=0;
  mvSnap.forEach(doc=>{ const r=doc.data(); if(r&&r.seq!=null){ inbox[r.seq]=r; cnt=Math.max(cnt,r.seq+1); } });
  // ONLINE 同期状態を初期化(復帰再生モード)
  ONLINE.active=true; ONLINE.ended=false; ONLINE._finishWritten=false; ONLINE._inMyAction=false;
  ONLINE.myUid=meUid; ONLINE.myIndex=(meUid===fu)?0:1; ONLINE.oppUid=(meUid===fu)?ou:fu;
  ONLINE.matchId=matchId; ONLINE.seq=0; ONLINE.inbox=inbox; ONLINE.waiters={};
  ONLINE.replayUntil=cnt; ONLINE.consecTimeouts=0; ONLINE._statsRecorded=false;
  ONLINE.oppSeenAt=0; ONLINE._oppPresMs=0; ONLINE._dcActive=false;
  ONLINE.matchRef=mref; ONLINE.movesRef=mref.collection("moves");
  ONLINE.oppNick=(d.players[ONLINE.oppUid]&&d.players[ONLINE.oppUid].nickname)||"相手";
  try{ mref.set({status:"playing", presence:{[meUid]:olTS()}},{merge:true}); }catch(e){}
  // ライブ購読(既存の手も初期スナップショットで再配信されるがinbox上書きで冪等)
  ONLINE.movesUnsub=ONLINE.movesRef.onSnapshot(sn=>{
   sn.docChanges().forEach(ch=>{ if(ch.type==="removed")return; olDeliver(ch.doc.data()); });
  }, err=>{ console.error("moves購読エラー",err); olNet("同期通信のエラーが発生しました。"); });
  ONLINE.matchUnsub=mref.onSnapshot(sn=>{ if(sn&&sn.exists) olOnMatchSnap(sn.data()); });
  resetModalChrome();
  $("ovl").classList.remove("on"); HOME_OPEN=false;
  const names=[ (d.players[fu].nickname||"先攻"), (d.players[ou].nickname||"後攻") ];
  newGame(deck0, deck1, {seed:d.seed, first:0, online:true, names});
  log(`=== 対戦に復帰: ${cnt}手を再生して現在局面まで復元します（あなたは ${ONLINE.myIndex===0?"先攻":"後攻"}） ===`,"imp");
  renderAll();
  olStartHeartbeat();
  rtcInitUI(); // 復帰後も「通話」を押せば繋がる(rtc状態は持ち越さずやり直し)
  olRunGame(); // catch-up(replayUntilまで)→ ライブ購読へ自動移行
 }catch(e){ console.error("復帰失敗",e); alert("対戦への復帰に失敗しました: "+(e&&e.message||e)); if(ONLINE.active)olEndCleanup(); showHome(); }
}
/* 離脱時の掃除(ベストエフォート) */
if(typeof window!=="undefined") window.addEventListener("beforeunload",()=>{
 try{ if(OL.queueRef)OL.queueRef.delete(); }catch(e){}
 try{ if(OL.roomRef)OL.roomRef.delete(); }catch(e){}
 // 対戦中の離脱は即敗北にしない(切断猶予60秒方式)。ハートビートを止めてソフトな切断状態にするだけ。
 // 60秒以内に「対戦に復帰」で戻れば継続。相手側は lastSeen が60秒 stale で勝ちを確定できる。
 try{ if(ONLINE.active && !ONLINE.ended){ olStopHeartbeat(); } }catch(e){}
 // 音声通話は離脱時に確実に停止(マイク開きっぱなし・PCリークを防ぐ)。復帰後は再度「通話」で繋ぎ直す。
 try{ if(RTC.active){ rtcCleanup(false); } }catch(e){}
});
// タブ復帰時はハートビートを即時送信して素早く生存を知らせる(相手の切断カウントを解除させる)
if(typeof document!=="undefined") document.addEventListener("visibilitychange",()=>{
 try{ if(!document.hidden && ONLINE.active && !ONLINE.ended){ if(!ONLINE.hbTimer)olStartHeartbeat(); else olBeat(); } }catch(e){}
});
/* ============ 起動 ============ */
async function boot(){
 layoutPanes();
 // スマホでは対戦記録パネルは初期状態で閉じる(右スライドアウト式のため)。PCは開いたまま。
 if(typeof window!=="undefined"&&window.matchMedia&&window.matchMedia("(max-width:820px)").matches){const pr=$("paneR");if(pr)pr.classList.remove("open");}
 showHome();   // いきなりデッキ選択に行かず、ホーム画面を表示
}
/* ログコピー */
async function copyLog(){
 const txt=G?G.logs.map(x=>x.m).join("\n"):"";
 const btn=$("copyLogBtn");
 try{await navigator.clipboard.writeText(txt);}
 catch(e){
  const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);
  ta.select();document.execCommand("copy");ta.remove();
 }
 if(btn){const t=btn.textContent;btn.textContent="✓コピーしました";setTimeout(()=>btn.textContent=t,1500);}
}
/* カードインスペクタ(ホバーで詳細表示) */
function findUnitByUid(uid){
 const u=units().find(x=>x.uid==uid);if(u)return u;
 for(const b of G.battles){if(b.intruder&&b.intruder.uid==uid&&!b.intruder.gone)return b.intruder;}
 return null;
}
function inspectHTML(no,u){
 const d=CARDS[no];
 const typ=d.type==="U"?`ユニット / ${d.race}`:d.type==="B"?"ベース":`ストラテジー《${d.timing}》`;
 let h=`<div class="iart" style="background-image:url('art/${no}.png')"></div>
 <div class="inm" style="color:var(--${d.col})"><span class="cdot" style="background:var(--${d.col})"></span>${d.name}</div>
 <div class="imeta">${typ}</div>
 <div>費用 ${costHTML(d.play)}${d.type==="U"?` ／ 移動 ${costHTML(d.move)}`:""}</div>
 ${d.type==="U"?`<div>パワー <b>${d.pow}</b> ／ スマッシュ <b>${d.sm}</b></div>`:""}`;
 if(u){
  const ep=effPow(u);
  h+=`<div class="inow">現在: パワー${ep}${ep!==d.pow?`(修整${ep>d.pow?"+":""}${ep-d.pow})`:""} ／ 被ダメージ${u.dmg} ／ ${u.frozen?"⏸フリーズ":"▶リリース"} ／ ${areaOf(u)==="center"?"中央":areaOf(u)==="home"?(u.ctrl===POV()?"自軍":"敵側自軍"):"敵軍"}エリア</div>`;
 }
 h+=`<div class="itx">${d.text||"(効果なし)"}</div>`;
 return h;
}
let IS_TOUCH=false;
function showInspectEl(el){
 const box=$("inspect");if(!box||!el)return;
 const no=+el.dataset.no;
 if(!CARDS[no]){hideInspect();return;}
 const u=(el.dataset.uid&&typeof G!=="undefined")?findUnitByUid(el.dataset.uid):null;
 box.style.border=`2px solid var(--${CARDS[no].col})`;
 box.innerHTML=inspectHTML(no,u);
 box.style.display="block";box.classList.add("show");
 // PC: 既定はスタックの真下(左上)。ただし選んだ要素が左側にあって詳細と重なる時は右へ回避する。
 if(!IS_TOUCH&&el.getBoundingClientRect){
  const er=el.getBoundingClientRect();
  const sw=$("stackWrap");
  const topY=(sw&&sw.getBoundingClientRect)?Math.max(8,sw.getBoundingClientRect().bottom+6):56;
  box.style.top=topY+"px"; box.style.bottom="auto";
  const w=box.offsetWidth||340;
  if(er.left < w+24){ box.style.left="auto"; box.style.right="8px"; } // 要素が左寄り→詳細を右へ
  else { box.style.left="8px"; box.style.right="auto"; }              // それ以外→左上
 } else if(IS_TOUCH&&el.getBoundingClientRect){
  // スマホ: 盤面ユニット(.uc)が上寄りの時だけ詳細を下側へ(かぶり回避)。それ以外(プラン/エネ/手札等)は常に上部で気づきやすく。
  const er=el.getBoundingClientRect(), vh=(typeof window!=="undefined"&&window.innerHeight)||700;
  const isBoardUnit=el.classList&&el.classList.contains&&el.classList.contains("uc");
  box.classList.toggle("lower", isBoardUnit && er.top < vh*0.45);
 }
}
function hideInspect(){const box=$("inspect");if(box){box.classList.remove("show");box.style.display="none";}if(typeof UI!=="undefined")UI._armEl=null;}
if(typeof document!=="undefined"){
 IS_TOUCH=typeof window!=="undefined"&&(("ontouchstart" in window)||(typeof navigator!=="undefined"&&navigator.maxTouchPoints>0));
 const isTouch=IS_TOUCH;
 if(!isTouch){
  // PC: ホバーで詳細
  document.addEventListener("mouseover",e=>{const el=e.target.closest&&e.target.closest("[data-no]");if(!el){hideInspect();return;}showInspectEl(el);});
  document.addEventListener("mouseout",e=>{const box=$("inspect");if(!box)return;if(e.target.closest&&e.target.closest("[data-no]")&&!(e.relatedTarget&&e.relatedTarget.closest&&e.relatedTarget.closest("[data-no]")))hideInspect();});
 }else{
  // スマホ: touchendで判定。1回目=詳細プレビューのみ(合成クリック=プレイを抑止), 同じ対象を2回目=確定(プレイ/選択)。
  // clickではなくtouchendで処理することで、プレイ可能なカード(プラン等)のゴーストクリック誤発火を防ぐ。
  let _moved=false;
  document.addEventListener("touchstart",()=>{_moved=false;},{passive:true});
  document.addEventListener("touchmove",()=>{_moved=true;},{passive:true});
  document.addEventListener("touchend",e=>{
   if(_moved)return;                                             // スクロールは無視
   const el=e.target.closest&&e.target.closest("[data-no]");
   if(!el){ if(UI._armEl){UI._armEl=null;hideInspect();} return; } // カード以外 → 閉じる(本来の操作はそのまま)
   if(UI._armEl===el){ UI._armEl=null; hideInspect(); return; }  // 2回目 → 抑止せず、後続clickで本来のonclick(プレイ)を発火
   e.preventDefault();                                           // 1回目 → 合成クリック(プレイ)を止めてプレビューのみ
   UI._armEl=el; showInspectEl(el);
  },{passive:false});
  // カード以外をタップしたら閉じる(clickでも拾う)
  document.addEventListener("click",e=>{ const el=e.target.closest&&e.target.closest("[data-no]"); if(!el&&UI._armEl){UI._armEl=null;hideInspect();} },true);
 }
}
/* 想定外エラーの可視化(サイレントフリーズ防止) */
if(typeof window!=="undefined"){
 window.addEventListener("unhandledrejection",e=>{
  try{log(`⚠ 内部エラー: ${e.reason&&e.reason.message||e.reason}`,"imp");
   log(`(お手数ですが、この直前の操作と共に報告してください)`,"sys");
   if($("pMsg"))$("pMsg").textContent="エラーが発生しました。記録欄を確認してください。";}catch(_){}
 });
 window.addEventListener("error",e=>{
  try{log(`⚠ 内部エラー: ${e.message}`,"imp");}catch(_){}
 });
}
/* ============ Firebase 認証・プロフィール (Phase3 M1) ============ */
let currentUser=null, currentProfile=null;
function escapeHTML(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function renderAccount(){
 const el=$("acct"); if(!el)return;
 if(!fbAuth){el.innerHTML='<span style="color:#e88a8a;font-size:11px">認証未接続</span>';return;}
 if(!currentUser){ el.innerHTML='<button class="acctLogin" onclick="signInGoogle()">🔑 Googleでログイン</button>'; return; }
 const nick=(currentProfile&&currentProfile.nickname)||currentUser.displayName||"プレイヤー";
 const rec=olStatsLabel();
 el.innerHTML=`<span class="acctName" onclick="toggleAcctMenu(event)" title="アカウント">👤 ${escapeHTML(nick)} <small style="color:var(--gold)">(${rec})</small> ▾</span>`+
  `<div id="acctMenu" class="acctMenu"><button onclick="showStatsHistory()">対戦成績・履歴</button><button onclick="changeNickname()">ニックネーム変更</button><button onclick="signOutUser()">ログアウト</button></div>`;
}
function toggleAcctMenu(e){if(e)e.stopPropagation();const m=$("acctMenu");if(m)m.classList.toggle("on");}
async function signInGoogle(){
 if(!fbAuth){alert("認証に接続できていません(Firebase未初期化)");return;}
 try{const p=new firebase.auth.GoogleAuthProvider();await fbAuth.signInWithPopup(p);}
 catch(e){console.error(e);if(e&&e.code!=="auth/popup-closed-by-user"&&e.code!=="auth/cancelled-popup-request")alert("ログイン失敗: "+(e.message||e.code||e));}
}
async function signOutUser(){const m=$("acctMenu");if(m)m.classList.remove("on");try{await fbAuth.signOut();}catch(e){console.error(e);}}
async function loadOrCreateProfile(user){
 if(!fbDB)return {nickname:user.displayName||"プレイヤー"};
 const ref=fbDB.collection("users").doc(user.uid);
 try{
  const snap=await ref.get();
  if(snap.exists)return snap.data();
  const prof={nickname:(user.displayName||"プレイヤー"),createdAt:firebase.firestore.FieldValue.serverTimestamp()};
  await ref.set(prof); return prof;
 }catch(e){console.error("プロフィール取得/作成失敗:",e);return {nickname:user.displayName||"プレイヤー"};}
}
async function changeNickname(){
 const m=$("acctMenu");if(m)m.classList.remove("on");
 if(!currentUser||!fbDB)return;
 const cur=(currentProfile&&currentProfile.nickname)||currentUser.displayName||"";
 const nn=prompt("ニックネーム（1〜20文字）",cur); if(nn==null)return;
 const nick=nn.trim().slice(0,20); if(!nick){alert("ニックネームを入力してください");return;}
 try{await fbDB.collection("users").doc(currentUser.uid).update({nickname:nick});currentProfile=Object.assign({},currentProfile,{nickname:nick});renderAccount();}
 catch(e){console.error(e);alert("変更に失敗しました");}
}
function initAuth(){
 renderAccount();
 if(!fbAuth)return;
 fbAuth.onAuthStateChanged(async user=>{
  currentUser=user;
  currentProfile=user?await loadOrCreateProfile(user):null;
  renderAccount();
  await syncDecksForUser(user);              // ログイン/ログアウトでデッキキャッシュを同期(初回はlocalStorageから移行)
  if(user){ startPresence(); startInviteInbox(); } else { stopPresence(); stopFriendsListeners(); stopInviteInbox(); }  // 在席ハートビート＋招待受信(ログイン中のみ)
  if(HOME_OPEN)showHome();                    // ホーム表示中ならログイン状態に合わせて再描画
 });
 document.addEventListener("click",()=>{const m=$("acctMenu");if(m)m.classList.remove("on");});
}
if(typeof document!=="undefined"&&document.getElementById("board")){if($("verLbl"))$("verLbl").textContent=GAME_VERSION;initAuth();boot();}
